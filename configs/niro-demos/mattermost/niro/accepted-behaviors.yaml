# accepted-behaviors.yaml — a risk-acceptance register.
#
# Every entry is a behavior treated as ACCEPTED: as long as an entry exists, the
# tool considers that behavior intended and does not re-report it. To stop
# accepting one, delete it — the finding comes back. Version control records who
# changed what, and when.
#
#   consequence:  [tool] the precise risk, in plain terms a non-expert can
#                 evaluate — what could actually happen. (max 1000 runes)
#   evidence:     [tool] proof it looks intentional — comment / test / flag /
#                 code, by file:line.
#   reason:       [human] your team's rationale for accepting this — your own
#                 documentation. The tool never writes it, and an entry is
#                 accepted by being here, not by this field. But fill it in: an
#                 undocumented acceptance no one can explain later is how real
#                 risk quietly gets forgotten.
#
# Be specific enough to adjudicate in seconds. Vague entries hide real bugs.
#
# This file accumulates across runs and is APPEND-ONLY. Anyone updating it — tool
# or human — must read it first, keep every existing entry (especially the human
# `reason`), and only append; never rewrite, reorder, or drop entries. Presence
# is the suppression signal, so a clobbered entry silently un-accepts a finding.
# COMMIT it to git — that is your history, your review trail, and your undo.

accepted_behaviors:
  # Added by the tool — accepted, rationale not yet documented:
  - consequence: "When TerminateSessionsOnPasswordChange is disabled, a person holding another active session remains authenticated after the account owner changes the password."
    evidence: "server/channels/app/user_test.go:1705 explicitly tests that parallel sessions remain active when the setting is disabled; docs/main/administration-guide/configure/environment-configuration-settings.mdx:3083 documents this configuration mode."
  # Added by the tool — accepted, rationale not yet documented:
  - consequence: "On self-hosted deployments that accept arbitrary request host values, an unauthenticated attacker can redirect users beginning an OAuth authorization flow to an attacker-controlled login origin, enabling credential phishing."
    evidence: "server/channels/web/handlers.go:225-227 intentionally derives the redirect base from the request Host for self-hosted deployments while the IsCloud capability branch uses configured SiteURL; server/channels/web/oauth.go:176-178 uses that base for unauthenticated authorization redirects."
  # Added by the tool — accepted, rationale not yet documented:
  - consequence: "When hardened mode is disabled and password-reset email delivery fails, an unauthenticated caller can distinguish registered from unregistered email addresses by the HTTP response."
    evidence: "server/channels/api4/user.go:2079-2086 explicitly masks password-reset delivery errors only when ServiceSettings.ExperimentalEnableHardenedMode is enabled; docs/main/administration-guide/configure/experimental-configuration-settings.mdx:270-292 documents hardened mode as an opt-in security-versus-user-experience trade-off that sanitizes 500 errors and defaults to false."
  # Added by the tool — accepted, rationale not yet documented:
  - consequence: "On self-hosted deployments that accept arbitrary request host values, an unauthenticated requester can make the magic-link account-entry route redirect users to an attacker-controlled login origin, enabling credential phishing."
    evidence: "server/channels/web/handlers.go:225-227 intentionally derives the redirect base from the request Host for self-hosted deployments while the IsCloud capability branch uses configured SiteURL; server/channels/web/magic_link.go:23-24 uses that base for the disabled magic-link redirect."
