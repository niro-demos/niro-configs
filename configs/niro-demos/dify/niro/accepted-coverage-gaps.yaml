# accepted-coverage-gaps.yaml — what cannot be tested in this setup, and why.
#
# Every entry is a coverage gap treated as ACCEPTED: as long as an entry exists,
# the tool will not re-report that gap on every run. To stop accepting one (it
# became testable — you added the credential, enabled the flag, wired the
# service), delete it. Version control records who changed what, and when.
#
#   gap:     what cannot be exercised here — the specific surface or capability
#            left untested. (max 1000 runes)
#   reason:  why it is structurally untestable in THIS setup — prod-only behavior,
#            external infra/secrets you don't have, a licensed build you can't
#            produce. Be specific enough that a reviewer can challenge it.
#
# Only genuinely unfixable gaps belong here. A gap you could close by adding a
# fixture, credential, or flag is work to do — not a gap to accept. Broad entries
# hide real blind spots.
#
# This file accumulates across runs and is APPEND-ONLY. Anyone updating it — tool
# or human — must read it first, keep every existing entry, and only append;
# never rewrite, reorder, or drop entries. There is no generator for it (it is
# authored judgment, not derived data), so a clobbered entry is gone for good.
# COMMIT it to git — that is your history, your review trail, and your undo.
#
# Create `accepted-coverage-gaps.yaml` next to this file, carrying this header
# into it so its rules travel with the data.

accepted_coverage_gaps:
  - gap: "Dataset Service API key generation (POST /console/api/datasets/<id>/api-keys)"
    reason: >-
      This endpoint 500s in this checkout: controllers/console/apikey.py's
      _create_api_key() (around line 109) does
      getattr(ApiToken, self.resource_id_field) with resource_id_field
      "dataset_id" for DatasetApiKeyListResource, but models/model.py's
      ApiToken class (~line 2332, which itself carries the comment "bug:
      this uses setattr so idk the field") only defines an app_id column,
      not dataset_id. This is an application code defect, not an
      environment limitation, and is out of scope for the harness to patch
      (see niro/harness/README.md: the harness builds and seeds the
      checkout, it does not fix the application's own bugs). The seeded
      org_a_dataset / org_b_dataset fixtures therefore have
      dataset_api_token: null instead of a working dataset-scoped Service
      API key. App-scoped Service API keys (POST
      /console/api/apps/<id>/api-keys) are unaffected and are seeded
      normally (org_a_app / org_b_app).
  - gap: "LLM/embedding model invocation (actual chat replies, dataset document indexing/retrieval, prompt-injection-via-model-output tests)"
    reason: >-
      This harness has no real model-provider credentials configured (no
      OPENAI_API_KEY or equivalent for any provider) and no committed
      seed step adds one, since that would mean embedding a real,
      billable third-party API key in a checked-in test harness. The
      seeded apps/datasets exist and their CRUD/auth/permission surface
      is fully testable, but sending a chat message or indexing a
      document will fail at the point Dify tries to call out to an LLM
      or embedding provider through plugin_daemon. Testing the request
      path up to that external call (authn/authz, input validation,
      SSRF via the model-provider URL config, etc.) is unaffected.
  - gap: "Plugin marketplace installation (marketplace.dify.ai)"
    reason: >-
      docker/.env.example's MARKETPLACE_API_URL / MARKETPLACE_URL point at
      the real, external https://marketplace.dify.ai. niro/scope.yaml
      authorizes only this harness's own localhost:<port> target (see
      "Never widen remote scope" in niro/harness/README.md), so installing
      or browsing marketplace plugins from a live pentest run is not
      exercised. Locally side-loaded/uploaded plugin packages are
      unaffected by this gap.
  - gap: "SSO / third-party OAuth login (Google, GitHub, OIDC, SAML)"
    reason: >-
      This is a self-hosted Community Edition deployment with no OAuth
      client id/secret configured for any provider (docker/.env.example
      ships them empty), and wiring a real OAuth app for a disposable
      local harness isn't meaningful. Only the built-in email+password
      login path (seeded OWNER_A/NORMAL_A/OWNER_B/NORMAL_B credentials)
      is exercised.
  - gap: "Outbound email delivery (invite emails, password-reset emails, email verification codes)"
    reason: >-
      No SMTP/mail provider is configured in this harness (docker/.env.example's
      mail settings are unset by default and the harness does not wire one
      up). Console invite-by-email and email-code login flows that depend
      on actually receiving mail are not exercised; account/tenant/role
      seeding instead goes through the direct account-service path (see
      niro/harness/seed/seed_accounts.py) and the documented
      `flask create-tenant` equivalent, which do not require email
      delivery.
  - gap: "Enterprise/billing-gated features (seat limits, licensed workspace count, enterprise RBAC add-ons)"
    reason: >-
      This is the open-source Community Edition image built from api/Dockerfile
      and web/Dockerfile (EDITION=SELF_HOSTED, no ENTERPRISE_ENABLED / license
      configured). Enterprise-only endpoints and license-gated limits either
      no-op or are unreachable in this build and cannot be exercised without
      a licensed enterprise build this harness does not have.
