# Niro-managed local runtime for Dify, built from this checkout.
#
# Scope (deliberately smaller than docker/docker-compose.yaml):
#   - api / worker / worker_beat / web are BUILT from this repo's own
#     Dockerfiles (api/Dockerfile, web/Dockerfile) so the target always
#     serves the current working tree, never a published image.
#   - db / pgvector / redis / plugin_daemon are unmodified third-party
#     infrastructure images (not code under review), matching
#     docker/docker-compose.yaml. plugin_daemon is included (unlike
#     upstream's default profile set, which is what you'd get from
#     docker-compose.yaml as-is) because several console endpoints call
#     into it even for plugin-free requests (e.g. listing datasets
#     enumerates model-provider plugins) -- without it those endpoints
#     fail outright rather than just lacking plugin features.
#   - agent_backend, the code-execution sandbox, and nginx are
#     intentionally NOT stood up here — see
#     niro/accepted-coverage-gaps.yaml for why and what that leaves untested.
#
# All mutable state (postgres/redis data, uploaded files, images) lives
# under niro/harness/run/, which is gitignored. Nothing is written into
# the rest of the repository tree.

name: niro-dify

x-api-image: &api-image niro-dify-api:local
x-api-env: &api-env
  MODE: api
  EDITION: SELF_HOSTED
  DEPLOY_ENV: PRODUCTION
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  SECRET_KEY: ${SECRET_KEY}
  MIGRATION_ENABLED: "true"

  # Externally reachable URLs (used to build links returned by the API:
  # invite/activation links, file download URLs, etc).
  CONSOLE_API_URL: http://localhost:${API_PORT}
  CONSOLE_WEB_URL: http://localhost:${WEB_PORT}
  SERVICE_API_URL: http://localhost:${API_PORT}
  APP_API_URL: http://localhost:${API_PORT}
  APP_WEB_URL: http://localhost:${WEB_PORT}
  FILES_URL: http://localhost:${API_PORT}
  INTERNAL_FILES_URL: http://api:5001
  TRIGGER_URL: http://localhost:${API_PORT}

  ENABLE_COLLABORATION_MODE: "false"
  MARKETPLACE_ENABLED: "false"
  ENABLE_WEBSITE_JINAREADER: "false"
  ENABLE_WEBSITE_FIRECRAWL: "false"
  ENABLE_WEBSITE_WATERCRAWL: "false"

  # Both default to false upstream (cloud-oriented gates). Enabled here so
  # the pentest can exercise self-registration and workspace creation as
  # real, reachable app surfaces instead of only CLI/service-seeded state.
  ALLOW_REGISTER: "true"
  ALLOW_CREATE_WORKSPACE: "true"

  DB_TYPE: postgresql
  DB_USERNAME: postgres
  DB_PASSWORD: ${DB_PASSWORD}
  DB_HOST: db
  DB_PORT: "5432"
  DB_DATABASE: dify

  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_USERNAME: ""
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  REDIS_DB: "0"
  CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1

  STORAGE_TYPE: opendal
  OPENDAL_SCHEME: fs
  OPENDAL_FS_ROOT: storage

  VECTOR_STORE: pgvector
  PGVECTOR_HOST: pgvector
  PGVECTOR_PORT: "5432"
  PGVECTOR_USER: postgres
  PGVECTOR_PASSWORD: ${PGVECTOR_PASSWORD}
  PGVECTOR_DATABASE: dify

  # No external LLM/embedding provider secret is available in this
  # environment; model-provider invocation is a recorded coverage gap.
  # No SMTP configured — MAIL_TYPE empty makes the mail extension a no-op
  # instead of failing, so invite/reset flows that read the token from
  # the API response still work.
  MAIL_TYPE: ""

  PLUGIN_DAEMON_URL: http://plugin_daemon:5002
  PLUGIN_DAEMON_KEY: ${PLUGIN_DAEMON_KEY}
  INNER_API_KEY_FOR_PLUGIN: ${PLUGIN_INNER_API_KEY}

  # No code-execution sandbox in this harness (see
  # accepted-coverage-gaps.yaml); left pointing at a default, unreachable
  # address so code that only *constructs* a client at import time doesn't
  # fail to boot.
  CODE_EXECUTION_ENDPOINT: http://sandbox:8194

networks:
  default:
    name: niro-dify-net

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: dify
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ${RUN_DIR}/volumes/db:/var/lib/postgresql/data
      # Only runs against a freshly-initialized (empty) data directory --
      # creates the separate `dify_plugin` database the plugin daemon needs.
      - ${HARNESS_DIR}/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "dify"]
      interval: 2s
      timeout: 3s
      retries: 60

  pgvector:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      PGUSER: postgres
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD}
      POSTGRES_DB: dify
      PGDATA: /var/lib/postgresql/data/pgdata
      PG_BIGM: "false"
    volumes:
      - ${RUN_DIR}/volumes/pgvector:/var/lib/postgresql/data
      - ${REPO_ROOT}/docker/pgvector/docker-entrypoint.sh:/docker-entrypoint.sh:ro
    entrypoint: ["/docker-entrypoint.sh"]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "dify"]
      interval: 2s
      timeout: 3s
      retries: 60

  redis:
    image: redis:6-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ${RUN_DIR}/volumes/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 2s
      timeout: 3s
      retries: 60

  # Published third-party product (not this repo's code, unlike api/worker/web) --
  # gates several console endpoints beyond plugins/marketplace (e.g. the
  # dataset list calls into it to enumerate model-provider plugins even for
  # keyword-only datasets), so it is worth the extra container despite no
  # LLM/embedding provider secret being configured here. See
  # accepted-coverage-gaps.yaml for what is still NOT covered (installing an
  # actual model provider, marketplace network access).
  plugin_daemon:
    image: langgenius/dify-plugin-daemon:0.6.3-local
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: dify_plugin
      DB_SSL_MODE: disable
      DB_DEFAULT_ENTRIES: "10"
      DB_MAX_OPEN_CONNS: "5"
      DB_MAX_IDLE_CONNS: "5"
      DB_CONN_MAX_LIFETIME: "60"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_USE_SSL: "false"
      SERVER_PORT: "5002"
      SERVER_KEY: ${PLUGIN_DAEMON_KEY}
      MAX_PLUGIN_PACKAGE_SIZE: "52428800"
      PPROF_ENABLED: "false"
      DIFY_INNER_API_URL: http://api:5001
      DIFY_INNER_API_KEY: ${PLUGIN_INNER_API_KEY}
      PLUGIN_REMOTE_INSTALLING_HOST: "0.0.0.0"
      PLUGIN_REMOTE_INSTALLING_PORT: "5003"
      PLUGIN_WORKING_PATH: /app/storage/cwd
      # No signed marketplace packages will be installed in this harness
      # (no internet-reachable marketplace exercised) -- skip signature
      # verification instead of sourcing/mounting a real signing key.
      FORCE_VERIFYING_SIGNATURE: "false"
      PLUGIN_STORAGE_TYPE: local
      PLUGIN_STORAGE_LOCAL_ROOT: /app/storage
      PLUGIN_INSTALLED_PATH: plugin
      PLUGIN_PACKAGE_CACHE_PATH: plugin_packages
      PLUGIN_MEDIA_CACHE_PATH: assets
    volumes:
      - ${RUN_DIR}/volumes/plugin_daemon:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:5002/health/check >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  api:
    build:
      context: ${REPO_ROOT}
      dockerfile: api/Dockerfile
      target: production
    image: *api-image
    restart: unless-stopped
    environment: *api-env
    depends_on:
      db:
        condition: service_healthy
      pgvector:
        condition: service_healthy
      redis:
        condition: service_healthy
      plugin_daemon:
        condition: service_started
    volumes:
      - ${RUN_DIR}/volumes/storage:/app/api/storage
      - ${HARNESS_DIR}:/niro-harness:ro
    ports:
      - "${API_PORT}:5001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  worker:
    image: *api-image
    restart: unless-stopped
    environment:
      <<: *api-env
      MODE: worker
      CELERY_WORKER_AMOUNT: "2"
    depends_on:
      db:
        condition: service_healthy
      pgvector:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ${RUN_DIR}/volumes/storage:/app/api/storage
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_healthcheck.celery inspect ping"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s

  worker_beat:
    image: *api-image
    restart: unless-stopped
    environment:
      <<: *api-env
      MODE: beat
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  web:
    build:
      context: ${REPO_ROOT}
      dockerfile: web/Dockerfile
    image: niro-dify-web:local
    restart: unless-stopped
    environment:
      # Docker sets HOSTNAME to the container id by default; Next's
      # standalone server.js binds to that literal value instead of all
      # interfaces, so without this override it only listens on the
      # container's bridge IP -- unreachable via localhost from inside the
      # container itself, which breaks the healthcheck below (host access
      # still worked, via Docker's published-port NAT to that IP).
      HOSTNAME: "0.0.0.0"
      EDITION: SELF_HOSTED
      DEPLOY_ENV: PRODUCTION
      CONSOLE_API_URL: ""
      SERVER_CONSOLE_API_URL: http://api:5001
      APP_API_URL: ""
      MARKETPLACE_API_URL: https://marketplace.dify.ai
      MARKETPLACE_URL: https://marketplace.dify.ai
      MARKETPLACE_ENABLED: "false"
      NEXT_PUBLIC_SOCKET_URL: ws://localhost:${WEB_PORT}
      NEXT_TELEMETRY_DISABLED: "1"
      ALLOW_EMBED: "false"
      ALLOW_UNSAFE_DATA_SCHEME: "false"
      ENABLE_WEBSITE_JINAREADER: "false"
      ENABLE_WEBSITE_FIRECRAWL: "false"
      ENABLE_WEBSITE_WATERCRAWL: "false"
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s
