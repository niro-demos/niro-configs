# accepted-coverage-gaps.yaml — what cannot be tested in this setup, and why.
#
# Every entry is a coverage gap treated as ACCEPTED: as long as an entry exists,
# the tool will not re-report that gap on every run. To stop accepting one (it
# became testable — you added the credential, enabled the flag, wired the
# service), delete it. Version control records who changed what, and when.
#
#   gap:     what cannot be exercised here — the specific surface or capability
#            left untested. (max 1000 runes)
#   reason:  why it is structurally untestable in THIS setup — prod-only behavior,
#            external infra/secrets you don't have, a licensed build you can't
#            produce. Be specific enough that a reviewer can challenge it.
#
# Only genuinely unfixable gaps belong here. A gap you could close by adding a
# fixture, credential, or flag is work to do — not a gap to accept. Broad entries
# hide real blind spots.
#
# This file accumulates across runs and is APPEND-ONLY. Anyone updating it — tool
# or human — must read it first, keep every existing entry, and only append;
# never rewrite, reorder, or drop entries. There is no generator for it (it is
# authored judgment, not derived data), so a clobbered entry is gone for good.
# COMMIT it to git — that is your history, your review trail, and your undo.
#
# Create `accepted-coverage-gaps.yaml` next to this file, carrying this header
# into it so its rules travel with the data.

accepted_coverage_gaps:
  - gap: "global:admin role — vertical-escalation testing of the admin-specific role (as distinct from global:owner)"
    reason: "Inviting a global:admin user requires n8n's paid 'Advanced Permissions' license feature (packages/cli/src/controllers/invitation.controller.ts, isAdvancedPermissionsLicensed check). This harness runs an unlicensed community build with no N8N_LICENSE_ACTIVATION_KEY/N8N_LICENSE_CERT available, so POST /rest/invitations with role=global:admin always returns 403 and no admin user can be seeded. The OWNER credential (global:owner) is a strict superset of global:admin's permissions, so member-vs-owner vertical-escalation checks are still fully exercisable; only the admin-vs-owner boundary specifically (the few things owner can do that admin cannot, e.g. license/encryption-key management) and the member-vs-admin-specifically boundary are unverified."

  - gap: "SSO/OIDC/SAML/LDAP login enforcement"
    reason: "This is a local, Niro-provisioned n8n instance seeded with email/password accounts only. No identity provider is configured or reachable from this environment, so SSO-gated login paths and IdP-driven user provisioning cannot be exercised."

  - gap: "Outbound email delivery (invite emails, password-reset emails)"
    reason: "No SMTP server is configured for this harness (N8N_SMTP_* unset), so n8n never sends real invite/reset emails; the seed script instead uses the inviteAcceptUrl token returned directly in the POST /rest/invitations response body. Email-transport-specific behavior (delivery, template rendering, link expiry via a real mail flow) is not exercised."

  - gap: "Queue/scaling-mode execution (separate webhook and worker processes, Redis-backed queue)"
    reason: "The harness runs n8n as a single process (main + embedded webhook + embedded worker via EXECUTIONS_MODE=regular, the default) for a fast, low-resource CI boot. Queue-mode-specific behavior (cross-process job handoff, worker isolation, Redis-backed queue auth/isolation) is not exercised. No Redis is provisioned in this environment."
