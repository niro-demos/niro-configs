  # TC-16C32A6A — Added by the tool — accepted, rationale not yet documented:
  - consequence: "Any authenticated user can make the server issue an outbound HTTP request to a destination of their choosing (any scheme/host/IP, including loopback and internal-only addresses) via POST /profile/image/url, and have the fetched response body saved and served back publicly and unauthenticated at /assets/public/images/uploads/<userId>.<ext>, turning the feature into a proxy for reaching networks the attacker cannot reach directly. Reproduced live against a freshly-registered throwaway account (user id 43, not a shared fixture): POSTing imageUrl=http://example.com/ to /profile/image/url returned 302 to /profile, and a subsequent unauthenticated GET /assets/public/images/uploads/43.jpg returned 200 with the literal example.com HTML body as content. Baseline control: GET /assets/public/images/uploads/999999.jpg (an id with no uploaded image) correctly served the SPA index.html fallback instead, ruling out a static-fallback false positive."
    evidence: "routes/profileImageUrlUpload.ts:16-30 — `const url = req.body.imageUrl` is passed unvalidated to `await fetch(url)` with no scheme/hostname/IP allow-list and no loopback/private-range block. Line 20 contains a deliberately-coded detection flag for abuse of exactly this fetch: `if (url.match(/(.)*solve\\/challenges\\/server-side(.)*/) !== null) req.app.locals.abused_ssrf_bug = true`. routes/verify.ts:102-103 checks that flag — `if (challengeUtils.notSolved(challenges.ssrfChallenge) && req.app.locals.abused_ssrf_bug === true) { challengeUtils.solve(challenges.ssrfChallenge) }` — to mark the challenge solved; server.ts:176 initializes `app.locals.abused_ssrf_bug = false` at boot and server.ts:238 registers the matching `/solve/challenges/server-side` route that the intended attack targets via this exact unguarded fetch(). data/static/challenges.yml (key: ssrfChallenge, name 'SSRF', category 'Broken Access Control', tags: Code Analysis, description 'Request a hidden resource on server through server.') documents this precisely as an intended training challenge. This is OWASP Juice Shop's deliberately-seeded SSRF challenge — the unvalidated fetch() is the intended vulnerable primitive (the PoC's generic http://example.com/ target exercises the identical unguarded code path as the intended /solve/challenges/server-side target), not an unintended bug."
