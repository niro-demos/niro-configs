  # TC-F86455B7 — Added by the tool — accepted, rationale not yet documented:
  - consequence: "A logged-in customer who owns any saved card can set their store wallet balance to any self-declared amount — including values far outside any sane top-up range and even negative values — by sending PUT /rest/wallet/balance with an arbitrary `balance` field. Reproduced live against a freshly-registered throwaway account (user id 46, not a shared fixture) with a card added for it: after adding the card, PUT {\"balance\":999999,\"paymentId\":8} returned 200 and the wallet balance became exactly 999999 (from 0); a follow-up PUT {\"balance\":-500000,\"paymentId\":8} returned 200 and the balance became exactly 499999. Positive control: PUT {\"balance\":50} with no card on file correctly returned 402 'Payment not accepted.', confirming the healthy baseline and isolating the red behavior to the amount-trust gap. That fabricated balance can then be spent at checkout wherever paymentId==='wallet' (routes/order.ts:147-152, which only checks wallet.balance >= totalPrice) to acquire goods without a real payment ever occurring."
    evidence: "routes/wallet.ts:21-36 addWalletBalance() only verifies card ownership (`CardModel.findOne({ where: { id: cardId, UserId } })`) and then calls `WalletModel.increment({ balance: req.body.balance }, ...)` directly — no payment-gateway call, no floor/ceiling. This exact contract (valid card ownership + client-supplied amount credited verbatim, no real-charge check) is asserted as the PASSING, expected behavior by the project's own test suite: test/api/wallet.test.ts:47-60 'PUT charge wallet from credit card of requesting user' asserts 200 and balance increasing by precisely the client-supplied value (200 -> 210 after {balance:10}), and :62-76 assert only card ownership/presence gates the call (402 otherwise) — i.e. the suite locks in 'trust the client's balance once a card is on file' as correct behavior, not a bug. No payment-gateway/charge-processing code exists anywhere in this codebase (grep for stripe/gateway/processPayment across routes, models, lib is empty) — no payment path in the entire app (cards, wallet, or otherwise) validates against a real charge, so this is baseline application design, not an isolated defect in wallet.ts. No `vuln-code-snippet` marker or data/static/challenges.yml entry ties this specific wallet-amount-trust behavior to an intended challenge; the wallet-adjacent 'Deluxe Fraud' / `freeDeluxeChallenge` (routes/deluxe.ts:16-46, data/static/challenges.yml:1349-1359) is a distinct bypass mechanic (omitting `paymentMode` entirely skips both the wallet and card checks), not wallet-balance-amount trust."
