  # TC-D74ABE3A — Added by the tool — accepted, rationale not yet documented:
  - consequence: "Any unauthenticated visitor can bypass the declared .md/.pdf-only allowlist on GET /ftp/<file> by appending a URL-encoded NUL byte plus a fake .md/.pdf suffix (e.g. /ftp/coupons_2013.md.bak%2500.md), retrieving the full raw contents of any file present in the server's ftp/ directory regardless of its real extension, including backup files and internal application metadata. Reproduced live: GET /ftp/coupons_2013.md.bak returned 403 'Only .md and .pdf files are allowed!', while GET /ftp/coupons_2013.md.bak%2500.md returned 200 with the full raw file body, and GET /ftp/package.json.bak%2500.md returned 200 with the full package.json.bak contents."
    evidence: "routes/fileServer.ts:26-38 verify() checks endsWithAllowlistedFileType(file) against the raw, un-truncated filename, then calls security.cutOffPoisonNullByte(file) to truncate at the embedded NUL byte before serving via res.sendFile — the truncation-after-allowlist-check ordering is exactly what makes the bypass possible, and it is deliberate: verifySuccessfulPoisonNullByteExploit(file) (lines 40-50) is called immediately after truncation and explicitly detects and marks solved exactly this exploit outcome for the specific files named in the finding, via a solveIf check for challenges.forgottenBackupChallenge that fires when the truncated filename equals coupons_2013.md.bak, and a solveIf check for challenges.forgottenDevBackupChallenge that fires when it equals package.json.bak, plus a dedicated solveIf check for challenges.nullByteChallenge that fires when any of those sub-challenges (or misplacedSignatureFileChallenge / easterEggLevelOneChallenge) is solved. data/static/challenges.yml key nullByteChallenge (around line 1438), name 'Poison Null Byte', category 'Improper Input Validation', description references the Poison Null Byte technique by name and its hints literally state: Depending on the files you try to retrieve you will probably solve Access a developers forgotten backup file, Access a salesmans forgotten backup file, Access a misplaced SIEM signature file, or Find the hidden easter egg along the way — naming the exact two files (package.json.bak and coupons_2013.md.bak) used in this finding's attack steps. This is OWASP Juice Shop's deliberately-seeded Poison Null Byte training challenge, not an unintended bug."
    reason: ""

