  # TC-80B37CDD — Added by the tool — accepted, rationale not yet documented:
  - consequence: "Any unauthenticated visitor who sends a malformed request that provokes a server-side exception (e.g. GET /video with header `Range: bytes=abc-def`, which flows an unvalidated, non-numeric Range header into `parseInt`/`fs.createReadStream` in routes/videoHandler.ts and throws a RangeError) receives Express's verbose default/custom error page: a full stack trace with absolute filesystem paths (e.g. `/home/runner/work/juice-shop/juice-shop/build/routes/videoHandler.js:63:44`), internal source file names/line numbers, node_modules/express frames, and the exact app name + Express version in the page title. Reproduced live: `curl -i http://127.0.0.1:3000/video -H 'Range: bytes=abc-def'` returns HTTP 500 with an HTML body titled 'RangeError [ERR_OUT_OF_RANGE]...' whose `<h1>` reads 'OWASP Juice Shop (Express ^4.22.1)' and whose `#stacktrace` list contains the absolute build path above — reconnaissance value for chaining further attacks."
    evidence: "server.ts:681-682 wires `app.use(verify.errorHandlingChallenge())` immediately followed by `app.use(errorhandler())` as the app's final, unconditional (not NODE_ENV-gated) error-handling middleware for every route. routes/verify.ts:79-82 `errorHandlingChallenge()` explicitly inspects any error passed to Express's error chain (`err && (statusCode === 200 || statusCode > 401)`) and marks it solved — code that exists purely to detect and reward provoking exactly this class of ungraceful error response. server.ts:730 goes further and customizes `errorhandler.title` to `${application.name} (Express ${utils.version('express')})`, i.e. the verbose title deliberately bakes in the app name and Express version rather than being an accidental default. `errorhandler` (package.json:108) is a regular (non-dev) dependency shipped and wired in production, not a dev-only convenience. data/static/challenges.yml:355-367 documents the matching challenge: name 'Error Handling', category 'Security Misconfiguration', key `errorHandlingChallenge`, description 'Provoke an error that is neither very gracefully nor consistently handled.', hints explicitly instructing players to 'submit bad input to forms' or 'tamper with URL paths or parameters' to trigger it. This is OWASP Juice Shop's deliberately-seeded improper-error-handling training challenge — the specific trigger found here (malformed Range header on /video) is one of many possible unhandled-exception paths the challenge is designed to be solvable through, not an unintended bug."
