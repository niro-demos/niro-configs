  - consequence: "Any unauthenticated visitor can recover the plaintext passwords exposed by CryptographicFailures LEVEL_2, LEVEL_3, and LEVEL_4 by reversing their Base64, Caesar, or custom encodings, and can use the fixed password/key for LEVEL_10."
