# accepted-behaviors.yaml — a risk-acceptance register.
#
# Every entry is a behavior treated as ACCEPTED: as long as an entry exists, the
# tool considers that behavior intended and does not re-report it. To stop
# accepting one, delete it — the finding comes back. Version control records who
# changed what, and when.
#
# The tool writes `consequence` and `evidence`; humans may add `reason` to
# document their rationale. This file is append-only.

accepted_behaviors:
  - consequence: "A signed-in standard user can edit the IDOR LEVEL_3 role cookie to ADMIN and read another user's salary profile."
    evidence: "src/main/java/org/sasanlabs/service/vulnerability/idor/IDORVulnerability.java explicitly presents LEVEL_3 role-cookie tampering as its INSECURE_DIRECT_OBJECT_REFERENCE challenge and deliberately authorizes from role_level3; src/test/java/org/sasanlabs/service/vulnerability/idor/IDORVulnerabilityTest.java explicitly asserts that LEVEL_3 accepts a forged ADMIN role."
  - consequence: "Any unauthenticated visitor can bypass SSRFVulnerability LEVEL_3's single-host metadata block with an alternate metadata-service address such as 169.254.170.2 and receive the application's mocked cloud credential document, including access-key, secret-key, and token fields."
    evidence: "src/main/resources/attackvectors/SSRFVulnerabilityPayload.properties:9-13 explicitly teaches that LEVEL_3 blocks only 169.254.169.254 and remains exploitable through other metadata-service mechanisms. src/main/java/org/sasanlabs/service/vulnerability/ssrf/SSRFVulnerability.java:121-132 declares LEVEL_3 as SIMPLE_SSRF and deliberately rejects only the literal 169.254.169.254 host, while src/main/java/org/sasanlabs/service/vulnerability/ssrf/MetaDataServiceMock.java:24-32 explicitly recognizes 169.254.170.2 as a metadata address and lines 113-125 provide the mocked credential response. src/test/java/org/sasanlabs/service/vulnerability/ssrf/SSRFVulnerabilityTest.java:104-122 explicitly asserts that LEVEL_3 blocks the primary metadata address but permits an alternate representation and returns metadata content."
  - consequence: "Any unauthenticated visitor can poison the route-only shared cache for CachePoisoning LEVEL_1 or LEVEL_2 with script-capable HTML, causing later visitors to receive and render the attacker's markup for the cache lifetime."
    evidence: "src/main/java/org/sasanlabs/service/vulnerability/cachePoisoning/CachePoisoningVulnerability.java:67-112 explicitly declares LEVEL_1 and LEVEL_2 as WEB_CACHE_POISONING and REFLECTED_XSS attack vectors and deliberately stores banner-derived responses under route-only public cache keys. src/main/resources/attackvectors/CachePoisoningPayload.properties:1-21 explicitly teaches poisoning LEVEL_1 with a script tag and LEVEL_2 with an event-handler payload so subsequent visitors execute it. src/test/java/org/sasanlabs/service/vulnerability/cachePoisoning/CachePoisoningVulnerabilityTest.java:191-272 explicitly names and asserts shared-cache replay at LEVEL_2, including replay of the event-handler XSS payload to the victim response."
  - consequence: "Any visitor can place a cookie-personalized CachePoisoning LEVEL_4 dashboard in the route-only public cache, causing later visitors to receive that user's username, email address, and last-login IP for the cache lifetime."
    evidence: "src/main/java/org/sasanlabs/service/vulnerability/cachePoisoning/CachePoisoningVulnerability.java:139-155 explicitly declares LEVEL_4 as a WEB_CACHE_POISONING attack vector and deliberately stores its cookie-derived response under a route-only public cache key. src/main/resources/attackvectors/CachePoisoningPayload.properties:40-45 explicitly teaches replaying one visitor's personalized PII to a clean visitor. src/test/java/org/sasanlabs/service/vulnerability/cachePoisoning/CachePoisoningVulnerabilityTest.java:430-459 explicitly names and asserts the cross-visitor personalized-content leak."
  - consequence: "Any unauthenticated caller can retrieve password verifiers from CryptographicFailures LEVEL_5 through LEVEL_9 that use MD4, MD5, SHA-1, LM, or unsalted SHA-256, allowing offline cracking of the seeded challenge passwords."
    evidence: "src/main/java/org/sasanlabs/service/vulnerability/cryptographicFailures/CryptographicFailuresVulnerability.java:226 explicitly labels LEVEL_5 as an MD4 hash-cracking challenge, exposes the stored hash at lines 236-248, and declares the weak-hash attack vector at lines 227-229; lines 272-445 deliberately repeat the challenge for MD5, SHA-1, LM, and unsalted SHA-256. src/main/java/org/sasanlabs/service/vulnerability/cryptographicFailures/repo/CryptographicFailuresSeeder.java:65-81 explicitly seeds those five levels with the corresponding legacy or unsalted hash functions. src/main/resources/i18n/messages.properties:326-330 explicitly instructs users to crack each exposed hash."
  - consequence: "Any unauthenticated caller can make AuthenticationVulnerability LEVEL_2 store a supplied password in plaintext application logs, allowing anyone with log access to recover and reuse that secret."
    evidence: "src/main/java/org/sasanlabs/service/vulnerability/authentication/AuthLoginService.java:62 explicitly labels LEVEL_2 as sensitive-data logging and states that it logs the provided password; line 66 deliberately writes the username and plaintext password to the application logger. src/main/resources/i18n/messages.properties:406 explicitly describes the plaintext password appearing in server logs as the LEVEL_2 demonstration."
  - consequence: "Any unauthenticated user who can reach CommandInjection LEVEL_1 through LEVEL_5 can execute arbitrary shell commands as the application service account."
    evidence: "src/main/java/org/sasanlabs/service/vulnerability/commandInjection/CommandInjection.java:23 — the class explicitly documents command-injection vulnerabilities; lines 29 and 64-67 gate it to the unsafe profile and declare LEVEL_1 as a COMMAND_INJECTION attack vector whose query parameter is directly executed."
  - consequence: "Any logged-in standard user can edit the userId_level2 cookie to read another user's salary profile, including their identifier, username, salary, and role."
    evidence: "src/main/java/org/sasanlabs/service/vulnerability/idor/IDORVulnerability.java:97 — the endpoint's challenge metadata explicitly presents cookie tampering as its payload; lines 107-120 declare an INSECURE_DIRECT_OBJECT_REFERENCE attack vector and deliberately fetch the profile selected by the cookie. src/test/java/org/sasanlabs/service/vulnerability/idor/IDORVulnerabilityTest.java:58 explicitly names and asserts that LEVEL_2 allows cookie tampering."
  - consequence: "A stolen LEVEL_4 session cookie remains usable after the user logs out, so an attacker can retain profile access until the server-side session otherwise expires."
    evidence: "src/main/java/org/sasanlabs/service/vulnerability/sessionManagement/SessionManagementVulnerability.java:182 explicitly declares LEVEL_4 as a MISSING_LOGOUT_INVALIDATION attack vector, and lines 211-213 deliberately call logoutWithoutInvalidation. src/test/java/org/sasanlabs/service/vulnerability/sessionManagement/SessionManagementServiceTest.java:97 explicitly names and asserts that LEVEL_4 logout does not invalidate the server-side session and that the old session still accesses the profile."
  - consequence: "Any logged-in standard user can change the LEVEL_1 id parameter to read another user's salary profile, including their identifier, username, salary, and role."
    evidence: "src/main/java/org/sasanlabs/service/vulnerability/idor/IDORVulnerability.java:58 — the endpoint's challenge metadata explicitly asks the user to exploit another profile ID; lines 68-86 declare an INSECURE_DIRECT_OBJECT_REFERENCE with no authorization and deliberately fetch the caller-selected id. src/test/java/org/sasanlabs/service/vulnerability/idor/IDORVulnerabilityTest.java:36 explicitly names and asserts that LEVEL_1 allows access to any id."
  - consequence: "An unauthenticated caller can make unlimited online password guesses against a chosen SessionManagement LEVEL_5 account because failed attempts are never throttled or locked out."
