# Niro-managed harness compose for DVWA.
#
# Self-contained compose that builds the DVWA image from the current checkout
# (project root = ../.. relative to this file) and bind-mounts the working tree
# into the container so the served code is always the current checkout — not a
# prebuilt or published image. The committed compose.yml pulls a published image
# with pull_policy: always; this file intentionally does NOT use it.
#
# DEFAULT_SECURITY_LEVEL=low exposes the full vulnerability catalog.
#
# All mutable runtime state lives under niro/harness/run/ via this project's
# .gitignore. The DB uses a named volume so `down` preserves data for fast
# restarts; reset.sh re-runs DVWA's own setup.php to drop/recreate the database.

services:
  dvwa:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: niro-dvwa:local
    pull_policy: never
    environment:
      - DB_SERVER=db
      - DB_DATABASE=dvwa
      - DB_USER=dvwa
      - DB_PASSWORD=p@ssw0rd
      - DEFAULT_SECURITY_LEVEL=low
      # Per-deployment secrets for the API token system (no hardcoded fallback
      # in source). AES-128-GCM key must be 16 bytes.
      - API_TOKEN_KEY=N1roDvwaKey2026!
      - API_TOKEN_SECRET=dvwa-api-token-secret-2026
      - API_REFRESH_TOKEN_SECRET=dvwa-api-refresh-secret-2026
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Serve the current working-tree code, not a stale build.
      - ../../:/var/www/html
      # Preserve composer-installed API vendor files (built into the image) via a
      # named volume so the bind mount above does not hide them. The API module
      # is optional but this keeps it functional without polluting the source tree.
      - api_vendor:/var/www/html/vulnerabilities/api/vendor
    networks:
      - dvwa
    ports:
      # Bind 0.0.0.0 so Niro's pentest container can reach the host via
      # host.docker.internal on native Linux (127.0.0.1 binding is not proxied).
      - "0.0.0.0:${DVWA_PORT:-4280}:80"
    restart: unless-stopped

  db:
    image: docker.io/library/mariadb:10
    environment:
      - MYSQL_ROOT_PASSWORD=dvwa
      - MYSQL_DATABASE=dvwa
      - MYSQL_USER=dvwa
      - MYSQL_PASSWORD=p@ssw0rd
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - dvwa
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

volumes:
  db_data:
  api_vendor:

networks:
  dvwa:
