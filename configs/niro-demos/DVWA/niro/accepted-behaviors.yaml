# accepted-behaviors.yaml — a risk-acceptance register.
#
# Every entry is a behavior treated as ACCEPTED: as long as an entry exists, the
# tool considers that behavior intended and does not re-report it. To stop
# accepting one, delete it — the finding comes back. Version control records who
# changed what, and when.
#
# Tool-added entries contain only the consequence and intent evidence. The human
# owner documents any acceptance rationale separately.

accepted_behaviors:
  - consequence: "Any unauthenticated user can receive PHP diagnostics from API error responses, revealing absolute server paths, controller class names, and source line numbers that can aid targeted attacks."
    evidence: "README.md:348-350 explicitly instructs operators to enable display_errors and display_startup_errors so PHP shows all error messages."
  - consequence: "Any unauthenticated visitor can reset the application database and administrator credentials to the documented defaults, then sign in as the administrator."
    evidence: "setup.php:6 invokes page startup without authentication, and setup.php:101-106 explicitly exposes database reset and administrator-credential reset at any stage."
