  - consequence: "Any authenticated user can bypass the Content Security Policy and execute arbitrary JavaScript in the browser by pointing the include parameter at the self-hosted JSONP endpoint (source/jsonp.php) with a crafted callback (e.g. callback=alert(document.cookie)//). The JSONP response is served with Content-Type: application/json but no X-Content-Type-Options: nosniff header, so the browser executes it as JavaScript when loaded via a script tag; and since 'self' is in the CSP script-src allowlist, the same-origin JSONP endpoint passes the policy. The injected script runs with the victim's session, enabling cookie theft and session hijacking."
