  # TC-F2FF58D0 — unsigned (alg=none) JWT accepted as valid, impersonating any user including admin
  - consequence: "Any unauthenticated caller can impersonate any registered
      user, including the global admin, by presenting a self-crafted JWT with
      `alg: none` and an empty signature bearing that user's email in `sub`.
      Confirmed live against host.docker.internal:8888: POST
      /identity/api/auth/verify returned 'The token is a valid JWT token' for
      such a token, and — more significantly than the sibling permitAll
      dashboard bypass below — presenting the same forged admin@example.com
      alg=none token as a bearer token against POST
      /identity/management/admin/lockUser (a route gated by
      `hasRole(\"ADMIN\")` behind the real JwtAuthTokenFilter, not permitAll)
      returned HTTP 200 with a business-logic response ('Given Email is not
      registered!') rather than 401, proving the filter authenticated the
      request as the admin and Spring Security's role check passed. Paired
      negative controls on the identical endpoint — no Authorization header,
      and a garbage/malformed bearer token — both correctly returned HTTP 401
      'Invalid Token', showing this is specific to the alg=none forgery, not
      a broadly-red harness."
    evidence: "services/identity/src/main/java/com/crapi/config/JwtProvider.java:170-209
      (validateJwtToken): the `catch (ParseException e)` block deliberately
      imports and calls `com.nimbusds.jwt.PlainJWT.parse(authToken)` — a type
      that by definition carries no signature — and returns `true` on success,
      with no algorithm/signature check at all; this is not an accidental
      fall-through but a second, purpose-built acceptance branch sitting
      immediately beside the already-accepted HS256 algorithm-confusion branch
      in the same method (:179-182, TC-C43D6E31) and the already-accepted JKU
      branch (:184-191, TC-D84388F0). All three live in the one method that
      docs/challenges.md 'Challenge 15 - Find a way to forge valid JWT Tokens'
      describes deliberately broadly: 'JWT Authentication in crAPI is
      vulnerable to various attacks. Find any one way to forge a valid JWT
      token and get full access to the platform' — the walkthrough in
      docs/challengeSolutions.md:108-116 enumerates four known solving
      techniques as examples ('crAPI is vulnerable to the following JWT
      Vulnerabilities'), not an exhaustive allowlist, and alg=none/unsigned-JWT
      is itself the textbook, first-taught technique for 'forge a valid JWT
      token' challenges of this kind. Given this method already hosts two
      other deliberately-planted, explicitly-accepted forgery branches for the
      same documented challenge, and the alg=none branch requires the same
      kind of purposeful extra code (a dedicated import and parse call) rather
      than an omitted check, this reproduces the same intended 'forge any JWT'
      lab exercise via a third technique, not a fourth independent accidental
      bug. Flagging for human review nonetheless because, unlike its two
      siblings, this specific branch carries no inline '(vulnerability)'
      comment and is not named among challengeSolutions.md's four listed
      examples — if the maintainers intended only those four, this one should
      be reopened as a real bug."
    reason: ""

  # TC-1882EC1A — PUT status:"returned" directly on an order bypasses the QR-code return flow and refunds on the spot
  - consequence: "Any authenticated user who owns an order can obtain a full
      refund credit without ever submitting the order for return or scanning
      a QR code, simply by sending `{\"status\": \"returned\"}` directly to
      PUT /workshop/api/shop/orders/{id} — the entire QR-based return process
      is skipped and the account is credited immediately. Confirmed live:
      order 10 (Pogba's account) and a freshly placed order 19 (a throwaway
