  # TC-5CE7A445 — order quantity mass-assignable via PUT, inflating a subsequent return refund
  - consequence: "Any authenticated user can convert a single $10 purchase into
      unlimited store credit: buy one item, PUT an arbitrary `quantity` onto
      the existing order (no credit check on this path), then PUT `status:
      returned` — the refund is computed as the tampered quantity times unit
      price, uncapped. Confirmed live on a fresh throwaway account: bought 1
      Seat ($10, credit 100 -> 90), PUT quantity to 12345 with no charge
      (credit stayed 90), then returned it for a refund of 12345 x $10 =
      $123,450, taking credit to $123,540. A paired positive control on the
      same account (buy 1, return without tampering quantity) refunded
      exactly 1 x $10, confirming the tampered path — not the environment —
      is what's broken."
    evidence: "services/workshop/crapi/shop/views.py:218-259
      (OrderControlView.put) mass-assigns `order.quantity =
      request_data[\"quantity\"]` with no charge/ownership-of-credit check
      (lines 240-241), then on a status transition to `returned` computes the
      refund as `order.quantity * order.product.price` using that tampered
      value (lines 250-254) — this is exactly the two-step exploit documented
      as an intended lab exercise in docs/challenges.md 'Challenge 8 - Get an
      item for free' ('crAPI allows users to return items they have
      ordered... find a way to get refunded for an item that you haven't
      actually returned. Leverage the predictable nature of REST APIs to find
      a shadow API endpoint that allows you to edit properties of a specific
      order') and 'Challenge 9 - Increase your balance by $1,000 or more'
      ('After solving \"Get an item for free\"... be creative and find a way
      to get refunded for an item you never returned, but this time try to
      get a bigger refund') — describing this specific shadow PUT endpoint,
      its ability to edit order properties (quantity) before a return, and
      using that to inflate the refund beyond the original purchase amount.
      Same quantity-manipulation-for-financial-gain vulnerability class
      already accepted for the POST path under the TC-74FEB153 entry above,
      citing the same doc challenges."
    reason: ""

  # TC-EA24BBE3 - forget-password endpoint reveals whether an email is registered
  - consequence: "Any unauthenticated visitor can determine whether any email
      address has an account registered in the system by submitting it to the
      password-reset endpoint (HTTP 200 + OTP-sent message for a registered
      email vs. HTTP 404 + 'Given Email is not registered!' for an unknown
      one), enabling bulk account enumeration to build a target list for
      credential-stuffing or phishing campaigns. Confirmed live against
      host.docker.internal:8888/identity/api/auth/forget-password with a
      registered email (adam007@example.com, 200) and a fresh nonexistent one
      (404 with the explicit not-registered message), reproduced twice."
    evidence: "services/identity/src/test/java/com/crapi/service/Impl/OtpServiceImplTest.java:187-195
      (generateOtpFailWhenUserNotFound) is an existing unit test that asserts
      the exact opposite of the invariant: it explicitly checks that
      generateOtp() returns HTTP 404 with message
      UserMessage.EMAIL_NOT_REGISTERED + email when the email isn't found,
      i.e. the app's own test suite locks in the distinguishable
      registered-vs-unregistered response as expected behavior. Matches the
      production code at
      services/identity/src/main/java/com/crapi/service/Impl/OtpServiceImpl.java:165
      (returns 404 + EMAIL_NOT_REGISTERED message) and
      services/identity/src/main/java/com/crapi/controller/AuthController.java:118
      (maps any non-200 service response to HttpStatus.NOT_FOUND)."
    reason: ""

  # TC-1B5DB221 — no lockout / rate limit on /v2/check-otp password-reset brute force
  - consequence: "Any unauthenticated attacker who knows or guesses a target's
      email address can exhaustively brute-force the 4-digit password-reset
      OTP (10,000 combinations) against POST
      /identity/api/auth/v2/check-otp with no lockout or throttling at any
      point, then set an arbitrary new password for that account and log in
      as them — full unauthenticated account takeover of any account whose
      reset flow has been initiated."
    evidence: "services/identity/src/main/java/com/crapi/controller/AuthController.java:121-134
      — the POST /v2/check-otp handler carries a javadoc comment directly
      above the mapping stating exactly this behavior is deliberate: '...its
      non secure API for attacker. in this attacker can enter \"n\" number
      of times invalid otp' — contrasted immediately below, lines 136-150,
      with POST /v3/check-otp's comment: '...its secure otp validator in
      this user can enter 10 times invalid otp after 10 invalid otp it will
      invalidate the otp.' The implementation matches: `validateOtp()` in
      services/identity/src/main/java/com/crapi/service/Impl/OtpServiceImpl.java:71-94
      increments a failure counter but never checks it, while the sibling
      `secureValidateOtp()` at :96-127 (same class, same file) implements the
      exact count-based lockout (503 + invalidate at attempt 10) that is
      missing from the v2 path — proving the lockout mechanism exists in the
      codebase and was deliberately left out of v2 to keep it exploitable
      as the insecure counterpart to v3, not omitted by oversight."
    reason: ""

  # TC-C43D6E31 — JWT algorithm-confusion (RS256 public key reused as HS256 secret)
  - consequence: "An unauthenticated attacker who fetches the public JWKS from
      GET /identity/api/auth/jwks.json can base64-encode that RSA public key
      and use it as an HMAC-SHA256 secret to forge a cryptographically valid
      JWT for any user, including the global admin, with no credentials.
      Confirmed live: POST /identity/api/auth/verify accepted such a forged
      HS256 token as valid, and POST
      /identity/management/admin/lockUser accepted it as a bearer token and
      locked an arbitrary target account."
    evidence: "services/identity/src/main/java/com/crapi/config/JwtProvider.java:150-164
      (getJwtSecret, commented '// Construct secret for JWT Verification
      through HS256 (vulnerability)' and '// Algorithm Confusion Attack') and
      :176-182 (validateJwtToken, commented '// JWT Algorithm confusion
      vulnerability', branches into the HS256 path using that same secret)
      implement exactly the technique documented as intentional in
      docs/challenges.md 'Challenge 15 - Find a way to forge valid JWT
      Tokens' and docs/challengeSolutions.md:111-116 'JWT Algorithm
      Confusion Vulnerability — crAPI uses RS256 JWT Algorithm by default
      ... Convert the public key to base64 encoded form and use it as a
      secret to create a JWT in HS256 Algorithm ... This JWT will be
      accepted as a valid JWT Token by crAPI.' This is the same code/doc
      pairing already recorded as intentional for the sibling JKU-misuse
      finding above (TC-D84388F0), which explicitly names this HS256
      algorithm-confusion branch as one of the deliberate sibling JWT
      vulnerabilities in this training application."
    reason: ""

