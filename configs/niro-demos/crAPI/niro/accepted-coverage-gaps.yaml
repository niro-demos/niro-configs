# accepted-coverage-gaps.yaml — what cannot be tested in this setup, and why.
#
# Every entry is a coverage gap treated as ACCEPTED: as long as an entry exists,
# the tool will not re-report that gap on every run. To stop accepting one (it
# became testable — you added the credential, enabled the flag, wired the
# service), delete it. Version control records who changed what, and when.
#
#   gap:     what cannot be exercised here — the specific surface or capability
#            left untested. (max 1000 runes)
#   reason:  why it is structurally untestable in THIS setup — prod-only behavior,
#            external infra/secrets you don't have, a licensed build you can't
#            produce. Be specific enough that a reviewer can challenge it.
#
# Only genuinely unfixable gaps belong here. A gap you could close by adding a
# fixture, credential, or flag is work to do — not a gap to accept. Broad entries
# hide real blind spots.
#
# This file accumulates across runs and is APPEND-ONLY. Anyone updating it — tool
# or human — must read it first, keep every existing entry, and only append;
# never rewrite, reorder, or drop entries. There is no generator for it (it is
# authored judgment, not derived data), so a clobbered entry is gone for good.
# COMMIT it to git — that is your history, your review trail, and your undo.
#
# Create `accepted-coverage-gaps.yaml` next to this file, carrying this header
# into it so its rules travel with the data.

accepted_coverage_gaps:
  - gap: "crapi-chatbot LLM-backed conversational responses and any
      vulnerability that only manifests inside a real model's output
      (e.g. successful prompt-injection exfiltration via the assistant's
      reply, tool-call chains that require the model to actually follow an
      injected instruction). CHATBOT_LLM_PROVIDER defaults to openai in
      deploy/docker/docker-compose.yml but no provider credential
      (CHATBOT_OPENAI_API_KEY / ANTHROPIC_API_KEY / Azure / Bedrock /
      Vertex / Groq / Mistral / Cohere) is provisioned in this harness, so
      outbound LLM calls fail. The chatbot HTTP surface itself
      (localhost:8888/chatbot/*, including POST /genai/init which accepts
      a per-session provider key from the caller) and its MCP server
      (localhost:5500) remain reachable and testable for auth, input
      validation, and structural issues — only the model-generated-output
      class of finding is out of reach."
    reason: "No LLM provider secret is available to this harness. Wiring in
      a real key (e.g. from this CI environment's own ANTHROPIC_API_KEY/
      OPENAI_API_KEY, present for running the agent itself) was considered
      and rejected: that would inject a live, spend-bearing external
      credential into the very target under active attack, which crosses
      the hard rule against adding external-API dependencies to a local
      harness and risks the pentest itself exfiltrating the key. Provision
      a dedicated, throwaway provider key via deploy/docker/.env
      (CHATBOT_OPENAI_API_KEY or ANTHROPIC_API_KEY) to close this gap."
