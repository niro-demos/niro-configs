# accepted-behaviors.yaml — a risk-acceptance register.
#
# Every entry is a behavior treated as ACCEPTED: as long as an entry exists, the
# tool considers that behavior intended and does not re-report it. To stop
# accepting one, delete it — the finding comes back. Version control records who
# changed what, and when.
#
#   consequence:  [tool] the precise risk, in plain terms a non-expert can
#                 evaluate — what could actually happen. (max 1000 runes)
#   evidence:     [tool] proof it looks intentional — comment / test / flag /
#                 code, by file:line.
#   reason:       [human] your team's rationale for accepting this — your own
#                 documentation. The tool never writes it, and an entry is
#                 accepted by being here, not by this field. But fill it in: an
#                 undocumented acceptance no one can explain later is how real
#                 risk quietly gets forgotten.
#
# Be specific enough to adjudicate in seconds. Vague entries hide real bugs.
#
# This file accumulates across runs and is APPEND-ONLY. Anyone updating it — tool
# or human — must read it first, keep every existing entry (especially the human
# `reason`), and only append; never rewrite, reorder, or drop entries. Presence
# is the suppression signal, so a clobbered entry silently un-accepts a finding.
# COMMIT it to git — that is your history, your review trail, and your undo.
#
# Create `accepted-behaviors.yaml` next to this file, carrying this header into
# it so its rules travel with the data.

accepted_behaviors:
  # TC-73180E7A
  - consequence: "Any staff user holding only the HANDLE_PAYMENTS permission can view and overwrite the name, PSP reference, and reported amounts of a payment TransactionItem that was created by a different staff user or the superuser (via transactionUpdate and transactionEventReport), even though they did not create it."
    evidence: "saleor/graphql/payment/utils.py:37-38 check_if_requestor_has_access() intentionally returns True for any authenticated `user` when `transaction.user_id` is set, without comparing to `user.pk` — matching the mutation's own documented contract in saleor/graphql/payment/mutations/transaction/transaction_update.py:77-84 ('...HANDLE_PAYMENTS for staff users. Staff user cannot update a transaction that is owned by the app.'), i.e. ownership (AuthorizationFilters.OWNER) is only enforced for apps, not for staff users. This is asserted by existing, passing tests: saleor/graphql/payment/tests/mutations/test_transaction_update.py::test_transaction_update_by_another_staff (staff_api_client with permission_manage_payments successfully updates a transaction whose `.user` is set to a different user, admin_user) and saleor/graphql/payment/tests/mutations/test_transaction_event_report.py::test_transaction_event_report_by_another_user (same pattern for transactionEventReport). A sibling test, test_only_app_owner_can_update_its_transaction_by_staff, confirms staff ARE blocked from app-owned transactions, showing the app/staff distinction is deliberate rather than an oversight."
    reason: ""

  # TC-42BB41CA
  - consequence: "A staff member who holds only the business permission tied to an event type (e.g. MANAGE_ORDERS for order events) — but not MANAGE_APPS and no read/manage access to a given webhook — can call `webhookTrigger` to make the server queue an HTTP delivery to that webhook's configured target URL using the webhook's own secret key and auth headers, with a payload shaped by that webhook's subscription query (which can select fields, such as another object's privateMetadata, beyond what the triggering user's own permission would normally expose)."
    evidence: "saleor/graphql/webhook/mutations/webhook_trigger.py:56 Meta.permissions = (AuthorizationFilters.AUTHENTICATED_STAFF_USER,); validate_permissions (line 116-129) intentionally checks only WebhookEventAsyncType.PERMISSIONS for the event type, never MANAGE_APPS or webhook ownership — matching the mutation's own published GraphQL description ('Requires permission relevant to processed event', saleor/graphql/schema.graphql:17446) and directly asserted by existing tests: saleor/graphql/webhook/tests/mutations/test_webhook_trigger.py::test_webhook_trigger_fail and ::test_webhook_trigger_missing_user_permission both grant staff_api_client only permission_manage_orders (no MANAGE_APPS) and assert the trigger succeeds/fails solely on that single event-type permission. The sibling mutation webhookDryRun (schema.graphql:17433) uses the identical AUTHENTICATED_STAFF_USER + event-type-permission gate and even accepts an arbitrary ad-hoc subscription query, confirming the design intent is per-event business permission, not webhook-level (MANAGE_APPS) authorization."
    reason: ""

  # TC-634EF5E0
  - consequence: "Any unauthenticated attacker can bypass the login rate limiter and make unlimited password-guessing attempts against any user account by rotating the X-Forwarded-For header value on each request, since the limiter's per-client cache key is derived from that attacker-controlled header. Reproduced live: with no X-Forwarded-For, a second failed tokenCreate attempt from the same connection is rejected with the 'Logging has been suspended...' throttling error; with a fresh X-Forwarded-For value on every request, 8/8 consecutive failed tokenCreate attempts returned the normal 'Please, enter valid credentials' error and never triggered the throttle."
    evidence: "saleor/core/utils/__init__.py:57-71 get_client_ip() unconditionally trusts the first valid IP found in X-Forwarded-For, with a docstring stating this is its intended purpose: 'Tries to get a valid IP address from X-Forwarded-For, if the user is hiding behind a transparent proxy or if the server is behind a proxy' (no trusted-proxy/REMOTE_ADDR check gates this). saleor/core/tests/test_core.py:53-68 test_get_client_ip is a parametrized test asserting this exact behavior — e.g. an X-Forwarded-For of '83.0.0.1' with no corresponding trust check must resolve to '83.0.0.1' — i.e. the maintainers wrote and merged a test that codifies unconditional XFF trust as the function's correct, intended behavior. saleor/account/throttling.py:22 authenticate_with_throttling() then keys the rate-limit cache directly off this value, so the throttle inherits whatever get_client_ip decides to trust."
    reason: ""

  # TC-0DE4DC81
  - consequence: "Anyone who additionally obtains the Django SECRET_KEY (a single deployment secret, e.g. from an env leak or misconfigured deploy) can forge an HS256-signed JWT that the GraphQL auth layer accepts as a valid bearer token for any account — including a superadmin whose `jwt_token_key` they read from the unencrypted payload of one of that admin's real tokens — driving full-privilege API calls (reading all customer PII, modifying orders, any staff-gated mutation). Live-reproduced against the running target: forged an HS256 token for a dedicated test customer using the harness's known SECRET_KEY and it was accepted by `{ me { id email isStaff } }`, returning that customer's real identity; a tampered-signature control on the same token was correctly rejected with 'Signature verification failed', isolating the behavior to the alg-confusion fallback rather than a broken auth pipeline."
    evidence: "saleor/core/jwt_manager.py:182-199 JWTManager.decode() reads the attacker-controlled `alg` header and falls back to `jwt.decode(token, settings.SECRET_KEY, algorithms=[\"HS256\"])` for any non-RS256 token — reached by every caller of core/jwt.py:jwt_decode/jwt_decode_with_exception_handler, including the primary GraphQL auth path (saleor/graphql/context.py:72, saleor/core/auth_backend.py:131). This is the exact behavior directly asserted by existing, currently-passing app tests, not a coverage gap: saleor/core/tests/test_jwt_manager.py::test_jwt_manager_decode_token_signed_with_hs256 (encodes a payload with `settings.SECRET_KEY`/HS256 and asserts `jwt_manager.decode()` returns it), and saleor/core/tests/test_jwt.py::test_jwt_decode_accepts_token_signed_with_hs256 and ::test_jwt_decode_accepts_app_token_hs256_with_audience (same assertion via the public `jwt_decode` wrapper). All Saleor-issued tokens are always encoded with RS256 only (JWTManager.encode() hardcodes `algorithm=cls._ALG`), so the HS256 decode path exists solely to accept externally-signed tokens — its presence and the accompanying test coverage indicate a deliberate design choice, not an oversight, though the security tradeoff (SECRET_KEY compromise fully defeats the RSA-only invariant the finding expects) may warrant re-review by the team that authored it."
    reason: ""

  # TC-677CDDD4
  - consequence: "A staff account holding only MANAGE_TRANSLATIONS can write raw <script>/event-handler HTML into the plain-text product/category/collection/attribute-value translation fields (name, seoTitle, seoDescription) and have it returned verbatim by the API. This is only a stored-XSS risk if some downstream storefront renders these fields into HTML without doing its own output encoding — the API itself is headless and has no HTML rendering surface of its own."
    evidence: "saleor/product/models.py:58,94,183,276 and saleor/seo/models.py:8-13 define name/seo_title/seo_description as plain CharFields with no sanitizer on the base (non-translated) Product/Category/Collection/AttributeValue models — exactly mirroring the translation models (saleor/product/models.py:276-277, saleor/seo/models.py:19-25). saleor/core/db/fields.py SanitizedJSONField + the nh3-based clean_editorjs (saleor/core/editorjs/cleaners.py:103-107) is deliberately scoped to the `description` rich-content field only. Live-verified against the running target: the primary, non-translation `productCreate` mutation (requires only MANAGE_PRODUCTS, no translation permission at all) stores and returns `name`='<script>alert(niro_verify_productcreate)</script>' and `seo.title`='<img src=x onerror=alert(niro_verify_seo)>' verbatim — the identical lack of sanitization the finding attributes to `productTranslate`. This is the API's uniform, pre-existing contract for every plain-text field regardless of which mutation or permission writes it, not a gap introduced by or specific to the translation mutations/MANAGE_TRANSLATIONS."
    reason: ""

  # TC-7FCF8B15
  - consequence: "A staff member who holds only the MANAGE_USERS permission (and not MANAGE_STAFF) can call `userBulkSetActive` to deactivate or reactivate any other non-superuser staff account, including ones with far broader permissions (e.g. MANAGE_STAFF, MANAGE_APPS, MANAGE_ORDERS), locking that higher-privileged staff member out of the platform. Confirmed live on isolated test data: a dedicated MANAGE_USERS-only actor (CR_004 / niro-staff-support@example.test) deactivated a disposable staff target that had been granted MANAGE_STAFF via a dedicated, verifier-owned permission group; the target and group were then deleted."
    evidence: "saleor/graphql/account/bulk_mutations/user_bulk_set_active.py:34-53 UserBulkSetActive.clean_instance only rejects self-deactivation and superuser targets — it never checks instance.is_staff or requires MANAGE_STAFF, unlike the sibling staffUpdate/staffDelete mutations (saleor/graphql/account/mutations/staff/staff_update.py:70-78, saleor/graphql/account/mutations/base.py:484-499) which both call get_out_of_scope_users to block a requestor from managing a staff target whose permission scope is wider than the requestor's own. This asymmetry is directly asserted by existing, passing tests: saleor/graphql/account/tests/bulk_mutations/test_user_bulk_set_active.py::test_staff_bulk_set_active and ::test_staff_bulk_set_not_active both grant staff_api_client only permission_manage_users and bulk (de)activate a user list that includes is_staff=True users (staff-1@example.com, staff-2@example.com from the user_list fixture in saleor/graphql/tests/fixtures.py:224-233), asserting success (full count, correct is_active) rather than a permission error — i.e. the current test suite already encodes 'MANAGE_USERS is sufficient to bulk (de)activate staff accounts' as the expected, correct behavior."
    reason: ""

  # TC-90DA95B5
  - consequence: "Anyone who knows (or guesses) an order's GraphQL ID — including an anonymous, unauthenticated visitor, or any other logged-in customer who is not the order's owner — can read that order's full detail via the `order(id:)` query: customer email, complete billing and shipping address, every line item (product/variant name, quantity, unit price), and the order total. Live-reproduced: an unauthenticated POST to /graphql/ for Customer B's order (id 1aec2559-9772-451c-a147-17ce9071f40b) returned userEmail, full billingAddress, and total.gross verbatim, with no Authorization header at all."
    evidence: "saleor/graphql/order/types.py:1605-1616 (`user` field), 1621-1638 (`billingAddress`/`shippingAddress`), and 1843-1851 (`userEmail`) each carry an explicit, public GraphQL schema description stating this exact two-tier contract: 'The full data can be access[ed] for orders created in Saleor 3.2 and later, for other orders requires one of the following permissions: MANAGE_ORDERS, OWNER.' The implementing resolvers (resolve_billing_address:2142-2161, resolve_shipping_address:2178-2194, resolve_user_email:2601-2619) all branch on `if order.use_old_id is False: return <unobfuscated value>` before ever checking the requester — i.e. for every order created since the 3.2 UUID-id migration (all orders in this instance), the full value is returned to any caller by design; obfuscation (obfuscate_address/obfuscate_email) is reserved for legacy pre-3.2 orders only. This mirrors the deliberately unauthenticated `orderByToken` query (saleor/graphql/order/resolvers.py:126-137), whose `resolve_order_by_token` looks orders up by `filter(id=token)` with no ownership check at all — confirming that for 3.2+ orders the UUID `id` doubles as the same bearer/capability token used for guest order-confirmation access, and `order(id:)` (resolvers.py:90-101, also unauthenticated, no ownership check) intentionally shares that same capability-token model rather than omitting a check by oversight. `lines`/`total`/`status` have no per-field restriction at all, consistent with the same 'knowing the ID/token is sufficient' design applied to the whole Order object."
    reason: ""

  # TC-085BB5E0
  - consequence: "A staff user with MANAGE_APPS permission can use appFetchManifest/appInstall to fingerprint open ports and read back HTTP status codes for loopback/internal network destinations reachable from the server, turning the manifest fetch into an internal recon oracle — but only when the app's outbound-HTTP loopback filter has been loosened. In this test harness that filter is deliberately relaxed (HTTP_IP_FILTER_ALLOW_LOOPBACK_IPS=True) to allow SSRF-style loopback testing; in production the default (HTTP_IP_FILTER_ALLOW_LOOPBACK_IPS=False, HTTP_IP_FILTER_ENABLED=True) rejects every loopback/private-IP destination before any socket connection is attempted, so all three probe outcomes the finding relies on (open+2xx, open+non-2xx, closed) collapse into one identical 'forbidden IP' error with no distinguishing signal — for both the synchronous appFetchManifest oracle and the async appInstall status-code leak. Verified directly against the harness's own requests_hardened dependency: `get_ip_address('127.0.0.1', 8005, allow_loopback=False)` raises `InvalidIPAddress('127.0.0.1')` before any request is sent, while `allow_loopback=True` (the harness's current setting) lets the probe through and reach the target."
    evidence: "saleor/settings.py:954,958-960 — HTTP_IP_FILTER_ENABLED defaults to True and HTTP_IP_FILTER_ALLOW_LOOPBACK_IPS defaults to False; saleor/core/http_client.py:6-8 wires both settings into the requests_hardened.Config used by fetch_manifest (saleor/app/installation_utils.py:206-212, called from saleor/graphql/app/mutations/app_fetch_manifest.py:41) and by install_app (reached from saleor/app/tasks.py's install_app_task). niro/accepted-coverage-gaps.yaml's existing 'Outbound webhooks to non-loopback destinations' entry already documents that this harness deliberately sets HTTP_IP_FILTER_ALLOW_LOOPBACK_IPS=True to permit loopback SSRF-style testing, which is the harness-only precondition the finding itself states is required ('The target must have HTTP_IP_FILTER_ALLOW_LOOPBACK_IPS=True (set in this harness) for loopback probing')."
    reason: ""

  # TC-A5F1C69F
  - consequence: "A staff account holding only HANDLE_PAYMENTS can create charge/refund/authorization transactions (transactionCreate) on any order store-wide, regardless of which customer placed it or which sales channel it belongs to."
    evidence: "saleor/account/models.py:421 Group.restricted_access_to_channels defaults to False, i.e. permission groups get store-wide (all-channel) access unless an admin explicitly opts a group into channel restriction; saleor/graphql/account/types.py:418-429 documents this in the public schema ('If at least one group has restrictedAccessToChannels set to False - all channels are returned'). saleor/graphql/payment/utils.py:22-46 check_if_requestor_has_access explicitly grants any staff user access to any user-owned transaction regardless of who created it ('if user and transaction.user_id: return True') — Saleor's payment-permission model has no per-customer ownership concept, only the optional per-channel one, and this same function gates the sibling transactionUpdate/transactionEventReport mutations. Live-verified against the running target: payment.manager@example.com (the exact account used in this finding) has restrictedAccessToChannels=false and accessibleChannels covering all three seeded channels (default-channel, channel-pln, test-channel); and transactionRequestAction — a sibling mutation in the same package that already implements the channel_permissions check the finding recommends adding to transactionCreate (saleor/graphql/payment/mutations/transaction/transaction_request_action.py:276 cls.check_channel_permissions(info, [channel.id])) — let this identical account act on a transaction I created on Customer B's order, failing only downstream on MISSING_TRANSACTION_ACTION_REQUEST_WEBHOOK (i.e. it passed the channel-permission check). The suggested remediation would not change the outcome for this account/scenario, confirming the demonstrated behavior is the product's designed default (unrestricted permission groups act store-wide) rather than a missing authorization check."
    reason: ""

  # TC-2EF036DF
  - consequence: "Any caller who knows (or guesses) a checkout's GraphQL id/token — including an unauthenticated user or a different, logged-in customer who does not own the checkout — can invoke `deliveryOptionsCalculate` on that checkout id and receive the full list of available carriers and prices, revealing the checkout's shipping destination and item composition to a non-owner. Live-reproduced against the running target: an unauthenticated POST and a Customer-B-authenticated POST to `deliveryOptionsCalculate` on Customer A's checkout (id 07b3c620-3c87-4067-853e-8e197c5ca16d, confirmed owned by niro-customer-a@example.test via an admin-authenticated `checkout.user` lookup) both returned the identical 5-carrier price list (Default $0.00, EMS $34.20, FedEx $40.42, UPS $59.59, DHL $66.19), with no permission error."
    evidence: "saleor/graphql/checkout/resolvers.py:36-45 resolve_checkout() resolves the plain `checkout(id:)` query for any caller holding the id/token with no ownership check, and saleor/graphql/checkout/types.py:640-682 (`availableShippingMethods`/`shippingMethods` field definitions) with resolver at :957-969 (`resolve_shipping_methods`, using the same checkout-deliveries data source as the mutation) already expose the identical carrier+price list through the pre-existing query surface, also with no ownership check. By contrast, `Checkout.user` is deliberately gated: saleor/graphql/checkout/types.py:928-942 resolve_user() calls check_is_owner_or_has_one_of_perms() before returning the owner's identity. This asymmetry is asserted by existing, currently-passing tests in saleor/graphql/checkout/tests/test_checkout.py: test_query_customer_checkout_as_anonymous_customer and test_query_other_customer_checkout_as_customer both assert a non-owner (anonymous or a different customer) CAN fetch another user's checkout — including lines and shippingPrice via the module's final QUERY_CHECKOUT definition at line 4282 — while test_authorized_access_to_checkout_user_as_staff_no_permission (line 1413) asserts the `user` field alone is denied without the right permission. This shows the checkout id/token is deliberately treated as a bearer capability for checkout commerce data (required to support guest/anonymous checkout flows), with only the `user` identity field intentionally ownership-gated. `deliveryOptionsCalculate` (saleor/graphql/shipping/mutations/delivery_options_calculate.py) is a new access path to data the existing query surface already exposes without an ownership check, not a new leak — the same capability-token pattern already accepted for orders under TC-90DA95B5."
    reason: ""

  # TC-247CADAF
  - consequence: "Any actor (logged in as any customer, or even unauthenticated) who knows or guesses a checkout's UUID-based ID can read and modify that checkout's cart contents and contact details — add lines, change quantities, delete lines, and change the checkout email/addresses/customer note — regardless of which account (if any) the checkout is assigned to. Live-reproduced on isolated test data: authenticated as niro-customer-a@example.test (TOKEN_A) and called checkoutLinesAdd then checkoutEmailUpdate against a fresh, verifier-owned checkout created by niro-customer-b@example.test; both mutations returned HTTP 200 with `errors: []` and the mutation took effect (line quantity 1 -> 3, email changed to an attacker-controlled address) with no ownership error at any point."
    evidence: "This is documented, intentional Saleor API design, not an oversight. https://docs.saleor.io/developer/checkout/overview#permissions (official docs) states verbatim: 'A checkout is identified by a UUID-based ID. Anyone who knows this ID can query or modify the checkout,' and its Public/Private table explicitly lists 'Cart details' (products, quantities, discounts, totals) and 'Addresses & contact' (shipping/billing address, customer email, customer note) as Public — accessible/modifiable to anyone who has the checkout ID — while only 'User' (the attached account link), Transactions, and Private metadata are Private (owner/staff-only). The code matches this exactly: saleor/graphql/checkout/mutations/utils.py get_checkout() (the single call site used by checkoutLinesAdd, checkoutLineDelete, checkoutLinesDelete, checkoutEmailUpdate, checkoutShippingAddressUpdate, checkoutBillingAddressUpdate, etc.) and saleor/graphql/checkout/resolvers.py resolve_checkout() never compare checkout.user_id to info.context.user — by design, since cart/contact fields are Public. The only checkout mutations that DO check `checkout.user and checkout.user != info.context.user` are saleor/graphql/checkout/mutations/checkout_customer_attach.py and checkout_customer_detach.py, because the `user` link is the one field the docs mark Private; this was independently confirmed live too — the same TOKEN_A request for `checkout(id) { email user { email } }` on Customer B's checkout returned `email` in plain (Public) while `user` came back null with a PermissionDenied error requiring MANAGE_USERS/HANDLE_PAYMENTS/HANDLE_TAXES/OWNER (saleor/graphql/checkout/types.py `user` field), matching the doc's Private classification for that field only. This is also the same capability-token pattern already accepted for order access under TC-90DA95B5 and for checkout delivery-option queries under TC-2EF036DF."
    reason: ""
