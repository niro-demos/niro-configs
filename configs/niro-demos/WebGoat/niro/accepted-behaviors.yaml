# accepted-behaviors.yaml — a risk-acceptance register.
#
# Every entry is a behavior treated as ACCEPTED: as long as an entry exists, the
# tool considers that behavior intended and does not re-report it. To stop
# accepting one, delete it — the finding comes back. Version control records who
# changed what, and when.
#
#   consequence:  [tool] the precise risk, in plain terms a non-expert can
#                 evaluate — what could actually happen. (max 1000 runes)
#   evidence:     [tool] proof it looks intentional — comment / test / flag /
#                 code, by file:line.
#   reason:       [human] your team's rationale for accepting this — your own
#                 documentation. The tool never writes it, and an entry is
#                 accepted by being here, not by this field.
#
# This file is append-only. Preserve existing entries and human-authored reasons.

accepted_behaviors:
  - consequence: "An authenticated learner can submit crafted XML to the vulnerable-components lesson and make the WebGoat JVM attempt to launch an attacker-chosen operating-system process under the service account."
    evidence: "src/main/resources/lessons/vulnerablecomponents/documentation/VulnerableComponents_content5a.adoc:1-18 explicitly asks learners to trigger CVE-2013-7285 through XStream.fromXML; src/main/java/org/owasp/webgoat/lessons/vulnerablecomponents/VulnerableComponentsLesson.java:24-56 deliberately deserializes the payload, triggers the dynamic proxy, and treats the resulting exception as success; src/it/java/org/owasp/webgoat/integration/GeneralLessonIntegrationTest.java:116-135 submits a ProcessBuilder payload and asserts that the assignment succeeds."
  - consequence: "An authenticated learner can make the reflected-XSS lesson return learner-supplied script markup that the lesson page renders in the WebGoat origin."
    evidence: "src/main/resources/lessons/xss/documentation/CrossSiteScripting_content5b.adoc:3-10 explicitly instructs learners to execute this reflected-XSS payload; src/main/java/org/owasp/webgoat/lessons/xss/CrossSiteScriptingLesson5a.java:65-85 returns the raw value and marks matching script input successful; src/it/java/org/owasp/webgoat/integration/XSSIntegrationTest.java:23-30 tests the script payload as a successful assignment."
  - consequence: "Anyone who gets a signed-in learner to follow the unsafe redirect lesson URL can send that learner to an attacker-controlled site and expose the learner's username in the external URL."
    evidence: "src/main/java/org/owasp/webgoat/lessons/openredirect/OpenRedirectRealRedirect.java:12-21 documents the endpoint as a real redirect for experimentation and explicitly marks its lack of validation intentional; src/test/java/org/owasp/webgoat/lessons/openredirect/OpenRedirectLessonMetadataTest.java:39-44 asserts that an attacker-controlled absolute URL is returned as the redirect target; src/main/resources/lessons/openredirect/html/OpenRedirect.html:130-132 invites learners to experiment with the real unsafe redirect."
  - consequence: "An external site can make a signed-in learner submit feedback and mark the CSRF lesson complete in that learner's account without approval inside WebGoat."
    evidence: "src/main/java/org/owasp/webgoat/lessons/csrf/CSRFFeedback.java:57-64 explicitly treats a session cookie, text/plain body, and foreign origin as the successful lesson solution; src/main/java/org/owasp/webgoat/lessons/csrf/CSRFFeedback.java:100-107 documents the cross-site auto-submitting form as the solution; src/test/java/org/owasp/webgoat/lessons/csrf/CSRFFeedbackTest.java:39-52 asserts that this foreign-referer request completes the lesson and returns a flag."
  - consequence: "An external site can make a signed-in learner publish a persistent review under that learner's account without approval inside WebGoat."
    evidence: "src/main/java/org/owasp/webgoat/lessons/csrf/ForgedReviews.java:83-101 stores the submitted review before treating a foreign referer plus the fixed token as the successful lesson solution; src/it/java/org/owasp/webgoat/integration/CSRFIntegrationTest.java:155-170 explicitly calls the fixed token a weakness and asserts that a foreign-site forged review completes the assignment."
  - consequence: "An authenticated learner can switch Challenge 8's vote request to HEAD to increment the shared vote tally and receive the Challenge 8 flag despite the page saying login is required to vote."
    evidence: "src/main/java/org/owasp/webgoat/lessons/challenges/challenge8/Assignment8.java:40-55 explicitly labels the handler as verb-based authentication, rejects only GET, and deliberately increments the vote and returns the flag for every other routed method; src/main/resources/lessons/challenges/documentation/Challenge_8.adoc:1 asks whether the learner can still vote."
  - consequence: "An authenticated learner can call the dormant Challenge 8 route and receive a full Java stack trace containing internal class names, framework flow, and source line numbers."
    evidence: "src/main/resources/application-webgoat.properties:1 deliberately enables stack traces for every Spring error response; src/main/resources/lessons/securitymisconfiguration/documentation/SecurityMisconfiguration_Task2.adoc:3-13 describes debug mode returning full stack traces and explicitly instructs learners to trigger and inspect one."
  - consequence: "An authenticated learner can point the JWT deletion lesson at a learner-controlled key set and have a forged token for Tom accepted, completing the protected deletion assignment."
    evidence: "src/main/resources/lessons/jwt/documentation/JWT_claim_misuse_jku_assignment.adoc:3-4 explicitly asks the learner to delete Tom's account despite Jerry's token being limited to Jerry; src/main/resources/lessons/jwt/i18n/WebGoatLabels.properties:29-33 instructs the learner to host a public key on WebWolf and point the JKU header at it; src/test/java/org/owasp/webgoat/lessons/jwt/claimmisuse/JWTHeaderJKUEndpointTest.java:56-64 asserts that an attacker-signed token using a learner-controlled JWKS completes the lesson; src/it/java/org/owasp/webgoat/integration/JWTLessonIntegrationTest.java:251-297 exercises the same flow end to end and asserts lessonCompleted is true."
  - consequence: "An authenticated learner can inject SQL through the JWT key identifier so a forged token for Tom is accepted and the JWT deletion lesson is completed."
    evidence: "src/main/resources/lessons/jwt/i18n/WebGoatLabels.properties:39-40 explicitly instructs learners to inject a UNION query through the kid header and forge a token for Tom; src/test/java/org/owasp/webgoat/lessons/jwt/claimmisuse/JWTHeaderKIDEndpointTest.java:33-49 constructs that SQL-injection token and asserts that it completes the assignment."
  - consequence: "An authenticated learner can use the JWT lesson's source-bundled verification key to forge a token for Tom that completes the account-deletion assignment."
    evidence: "src/main/resources/lessons/jwt/db/migration/V2019_09_25_1__jwt.sql:1-6 deliberately seeds the named verification key and plaintext value used by the lesson; src/main/java/org/owasp/webgoat/lessons/jwt/claimmisuse/JWTHeaderKIDEndpoint.java:57-88 resolves the learner-supplied kid from that lesson database and marks a valid token naming Tom successful; src/test/java/org/owasp/webgoat/lessons/jwt/claimmisuse/JWTHeaderKIDEndpointTest.java:29-49 asserts that an attacker-created token for Tom, signed with a learner-known key selected through kid, completes the assignment."
  - consequence: "An authenticated learner can brute-force the JWT weak-key lesson's five-word signing-key set, forge a token whose username is WebGoat, and complete the assignment."
    evidence: "src/main/resources/lessons/jwt/documentation/JWT_weak_keys:3-9 explicitly teaches an offline brute-force or dictionary attack and asks the learner to submit a newly signed token with the username changed to WebGoat; src/main/resources/lessons/jwt/i18n/WebGoatLabels.properties:13-17 directs the learner to brute-force the token with a word list and change the user to WebGoat; src/test/java/org/owasp/webgoat/lessons/jwt/JWTSecretKeyEndpointTest.java:49-58 asserts that a token signed with the lesson secret and naming WebGoat completes the assignment."
  - consequence: "An authenticated learner who has another user's expired JWT access token can combine it with the learner's own refresh token to mint a fresh access token for that other user and complete protected JWT refresh lesson actions as them."
    evidence: "src/main/resources/lessons/jwt/i18n/WebGoatLabels.properties:19-24 explicitly directs the learner to use the found expired access token with their own refresh token; src/test/java/org/owasp/webgoat/lessons/jwt/JWTRefreshEndpointTest.java:35-76 obtains Jerry's refresh token, combines it with Tom's expired access token, and asserts that the resulting Tom token completes the assignment."
  - consequence: "An authenticated learner can forge an unsigned JWT claiming to be Tom or an administrator, reset the JWT lesson's shared vote tally, and complete the JWT vote-reset and checkout assignments."
    evidence: "src/main/resources/lessons/jwt/documentation/JWT_signing.adoc:21-23 explicitly instructs the learner to alter the token, become an admin, and reset the votes; src/test/java/org/owasp/webgoat/lessons/jwt/JWTVotesEndpointTest.java:38-53 constructs an unsigned alg:none admin token for Tom and asserts that vote reset completes the lesson; src/test/java/org/owasp/webgoat/lessons/jwt/JWTRefreshEndpointTest.java:79-95 constructs an unsigned alg:none token for Tom and asserts that checkout completes the lesson with dedicated alg:none success feedback."
  - consequence: "An authenticated learner can forge an admin JWT for the voting lesson, reset the shared lesson ballot, and mark the assignment complete without legitimate admin access."
    evidence: "src/main/resources/lessons/jwt/documentation/JWT_signing_solution.adoc:26-80 explicitly instructs a non-admin learner to forge an admin token and use it to reset the votes; src/test/java/org/owasp/webgoat/lessons/jwt/JWTVotesEndpointTest.java:38-71 asserts that learner-forged admin tokens reset the votes and complete the assignment."
  - consequence: "An authenticated learner can submit a crafted serialized task that makes the WebGoat service run the permitted operating-system command `sleep 5` or `ping` under the service account."
    evidence: "src/main/resources/lessons/deserialization/documentation/InsecureDeserialization_Task.adoc:1-8 explicitly asks learners to alter a serialized object to delay the response by five seconds; src/main/java/org/dummy/insecure/framework/VulnerableTaskHolder.java:43-76 deliberately executes short sleep or ping commands during deserialization; src/test/java/org/owasp/webgoat/lessons/deserialization/DeserializeTest.java:21-42 and src/it/java/org/owasp/webgoat/integration/DeserializationIntegrationTest.java:18-35 assert that a serialized sleep/ping task completes the lesson successfully."
  - consequence: "An authenticated learner can submit malformed XML to the XXE lesson endpoints and receive Java parser stack traces that expose source class names, controller methods, source line numbers, and framework internals."
    evidence: "src/test/java/org/owasp/webgoat/lessons/xxe/SimpleXXETest.java:64-72 explicitly asserts that invalid input returns output beginning with jakarta.xml.bind.UnmarshalException; src/main/resources/lessons/xxe/documentation/XXE_changing_content_type_solution.adoc:20-33 and 46-53 show learners the parser exception returned for invalid XML and use it to guide the lesson."
  - consequence: "An authenticated learner can upload a crafted ZIP that writes outside its temporary extraction directory and replaces the image served from that learner's profile endpoint."
    evidence: "src/main/resources/lessons/pathtraversal/documentation/PathTraversal_zip_slip_assignment.adoc:1-3 explicitly asks the learner to overwrite the current profile image through the ZIP upload; src/main/resources/lessons/pathtraversal/documentation/PathTraversal_zip_slip_solution.adoc:18-30 instructs the learner to create and upload a traversing ZIP to solve the assignment; src/it/java/org/owasp/webgoat/integration/PathTraversalIntegrationTest.java:122-147 constructs a traversal entry targeting the learner's image and asserts that the upload completes the lesson."
  - consequence: "An authenticated learner can make the XXE content-type lesson read process-accessible server files and persist their contents in that learner's lesson comments."
    evidence: "src/main/resources/lessons/xxe/documentation/XXE_changing_content_type.adoc:3-5 explicitly asks learners to perform XML injection against the content-type assignment; src/main/resources/lessons/xxe/documentation/XXE_changing_content_type_solution.adoc:63-73 provides an external file entity payload for that endpoint; src/test/java/org/owasp/webgoat/lessons/xxe/ContentTypeAssignmentTest.java:46-58 names the external-file payload workingAttack and asserts that it solves the assignment."
  - consequence: "An authenticated learner can use encoded path traversal in the random-picture lesson endpoint to list server-side paths and read JPEG files outside the cat-image directory, including files uploaded by another learner."
    evidence: "src/main/resources/lessons/pathtraversal/documentation/PathTraversal_retrieval.adoc:1-4 explicitly asks learners to retrieve another file from the system; src/test/java/org/owasp/webgoat/lessons/pathtraversal/ProfileUploadRetrievalTest.java:45-60 asserts that encoded traversal lists the secret file and retrieves it; src/it/java/org/owasp/webgoat/integration/PathTraversalIntegrationTest.java:104-114 exercises the encoded traversal end to end and asserts disclosure of the secret file."
  - consequence: "An authenticated learner can traverse out of their own profile upload directory through all three path-traversal upload lesson handlers, overwrite another learner's profile image, and write files into shared WebGoat lesson state."
    evidence: "src/main/resources/lessons/pathtraversal/documentation/PathTraversal_upload.adoc:1-10 explicitly asks learners to upload outside the usual directory; src/main/resources/lessons/pathtraversal/documentation/PathTraversal_upload_fix.adoc:1-10 and PathTraversal_upload_remove_user_input.adoc:1-12 explicitly ask learners to bypass both attempted fixes; src/main/resources/lessons/pathtraversal/i18n/WebGoatLabels.properties:6-16 gives behavior-specific traversal and bypass hints; src/it/java/org/owasp/webgoat/integration/PathTraversalIntegrationTest.java:44-101 asserts traversal payloads complete all three assignments."
  - consequence: "An authenticated learner can use the secret phrase shipped for the secure-defaults lesson together with the predictable file name `default_secret` to complete the protected decryption assignment."
    evidence: "src/main/resources/lessons/cryptography/documentation/defaults.adoc:18-29 explicitly instructs learners to retrieve the secret left in the lesson's Docker image and use it to decrypt the message; src/it/java/org/owasp/webgoat/integration/CryptoIntegrationTest.java:145-158 decodes the shipped secret phrase, submits it with `default_secret`, and asserts that the assignment succeeds."
  - consequence: "An authenticated learner can download the signing lesson's session-specific RSA private key, use it to sign that key's modulus, and submit the signature to complete the lesson."
    evidence: "src/main/resources/lessons/cryptography/html/Cryptography.html:82-95 explicitly displays the private key and asks the learner to submit its modulus and a signature; src/main/java/org/owasp/webgoat/lessons/cryptography/SigningAssignment.java:37-49 deliberately generates, stores, and returns the session private key; src/it/java/org/owasp/webgoat/integration/CryptoIntegrationTest.java:122-142 fetches that private key, signs its modulus, and asserts assignment success."
  - consequence: "An authenticated learner can recover the hashing lesson's password-equivalent secrets from the returned unsalted MD5 and SHA-256 digests using a five-word dictionary and submit them to complete the assignment."
    evidence: "src/main/resources/lessons/cryptography/documentation/hashing_plan.adoc:8-20 explicitly teaches dictionary recovery of passwords from plain unsalted hashes and asks learners to find the matching passwords; src/main/java/org/owasp/webgoat/lessons/cryptography/HashingAssignment.java:28-75 deliberately selects answers from a five-word list, returns their MD5 and SHA-256 digests, and accepts the recovered plaintexts; src/it/java/org/owasp/webgoat/integration/CryptoIntegrationTest.java:82-119 exhaustively compares both returned digests against that list and asserts the recovered answers complete the assignment."
  - consequence: "Anyone who can reach WebGoat can send arbitrary spoofed messages to a learner's in-app mailbox without signing in."
    evidence: "src/main/java/org/owasp/webgoat/container/WebSecurityConfig.java:46-50 explicitly makes POST /mail public because lessons send mailbox messages without a session; src/test/java/org/owasp/webgoat/container/mailbox/MailboxControllerTest.java:55-70 posts mail without an authenticated principal and asserts HTTP 201 Created."
  - consequence: "An authenticated learner can decode the username-and-password pair returned by the Basic-encoding lesson and submit those recovered values to complete the assignment."
    evidence: "src/main/resources/lessons/cryptography/html/Cryptography.html:29-36 explicitly presents the returned header as intercepted and asks the learner for its decoded username and password; src/main/resources/lessons/cryptography/documentation/encoding_plan.adoc:3-25 teaches that Base64 is reversible and shows credentials encoded in a Basic Authorization header; src/it/java/org/owasp/webgoat/integration/CryptoIntegrationTest.java:52-71 decodes the returned header, submits the recovered username and password, and asserts assignment success."
  - consequence: "An authenticated learner can lower the browser-submitted total for the HTML tampering lesson and have the server accept the discounted TV purchase, completing the assignment."
    evidence: "src/main/resources/lessons/htmltampering/documentation/HtmlTampering_Task.adoc:1-2 explicitly asks the learner to buy one or more TVs for a lower price; src/main/resources/lessons/htmltampering/documentation/HtmlTampering_Mitigation.adoc:3-9 explains that the server accepts the client-calculated price and identifies server-side recalculation as the mitigation; src/main/java/org/owasp/webgoat/lessons/htmltampering/HtmlTamperingTask.java:22-29 deliberately marks a sufficiently lowered submitted Total as successful."
  - consequence: "An authenticated learner can sign in to the security-misconfiguration lesson's staging administrative profile with the published admin/admin credentials and view the profile response without MFA."
    evidence: "src/main/java/org/owasp/webgoat/lessons/securitymisconfiguration/DefaultCredentialsTask.java:20-49 explicitly defines the task as demonstrating default-credential exploitation and returns the staging admin profile for admin/admin; src/test/java/org/owasp/webgoat/lessons/securitymisconfiguration/DefaultCredentialsTaskTest.java:38-44 asserts that admin/admin succeeds; src/it/java/org/owasp/webgoat/playwright/webgoat/lessons/SecurityMisconfigurationLessonUITest.java:33-40 submits admin/admin and asserts the compromise message."
  - consequence: "An authenticated learner can trigger the verbose-error lesson to disclose staging database credential strings and a working system API token, then use that token to read the lesson's protected debug configuration and complete the assignment."
    evidence: "src/main/resources/lessons/securitymisconfiguration/documentation/SecurityMisconfiguration_Task2.adoc:3-13 explicitly instructs learners to extract the leaked database credentials and system token, use the token against /config, and submit it; src/main/java/org/owasp/webgoat/lessons/securitymisconfiguration/VerboseErrorTask.java:21-70 deliberately returns those values, accepts the leaked token at /config, and marks submission of it successful; src/test/java/org/owasp/webgoat/lessons/securitymisconfiguration/VerboseErrorTaskTest.java:23-28 and 54-66 assert that the response leaks the token and that it grants config access and completes the assignment."
  - consequence: "An authenticated learner can poison the password-reset link's Host header so Tom's reset token is delivered to the learner's WebWolf inbox, then use that token to choose Tom's password and log in as Tom."
    evidence: "src/main/resources/lessons/passwordreset/documentation/PasswordReset_host_header.adoc:11-15 explicitly asks the learner to reset Tom's password and log in as him; src/main/resources/lessons/passwordreset/i18n/WebGoatLabels.properties:18-23 instructs the learner to redirect the link by changing the Host header; src/main/java/org/owasp/webgoat/lessons/passwordreset/ResetLinkAssignmentForgotPassword.java:61-76 deliberately recognizes a WebWolf Host header and sends the reset link to WebWolf; src/it/java/org/owasp/webgoat/integration/PasswordResetLessonIntegrationTest.java:71-82 and 111-140 performs the poisoned-Host flow, retrieves the token, changes Tom's password, and asserts login succeeds."
  - consequence: "An external site can make a signed-in learner reset that learner's lesson progress and reinitialize the learner's lesson data without approval inside WebGoat."
    evidence: "src/main/java/org/owasp/webgoat/container/service/RestartLessonService.java:35-49 deliberately exposes the progress and lesson-data reset as a GET request; src/it/java/org/owasp/webgoat/playwright/webgoat/pages/lessons/LessonPage.java:41-47 asserts that reset is performed by GET; src/main/java/org/owasp/webgoat/container/WebSecurityConfig.java:67 explicitly disables Spring Security CSRF protection for the application."
  - consequence: "An authenticated learner can receive Java exception details, source filenames and line numbers, and Spring framework internals when the password-reset mail endpoint encounters a server error."
    evidence: "src/main/resources/application-webgoat.properties:1 deliberately enables stack traces for every Spring error response; src/main/resources/lessons/securitymisconfiguration/documentation/SecurityMisconfiguration_Task2.adoc:3-13 explicitly tells learners that exceptions return full stack traces and instructs them to trigger and inspect one."
  - consequence: "An authenticated learner can bypass the SQL keyword-removal exercise with fragmented keywords and read usernames and passwords from the learner's lesson database."
    evidence: "src/test/java/org/owasp/webgoat/lessons/sqlinjection/mitigation/SqlOnlyInputValidationOnKeywordsTest.java:18-28 submits the exact fragmented SELECT/FROM payload and asserts lesson completion plus disclosure of a stored password; src/it/java/org/owasp/webgoat/integration/SqlInjectionMitigationIntegrationTest.java:51-55 exercises the same payload end to end and asserts that the assignment succeeds; src/main/java/org/owasp/webgoat/lessons/sqlinjection/mitigation/SqlOnlyInputValidationOnKeywords.java:19-49 provides bypass hints, removes SELECT/FROM only once, executes the resulting query, and returns its output."
  - consequence: "An authenticated learner can bypass the spaces-only SQL filter and read usernames and passwords from the learner's lesson database."
    evidence: "src/test/java/org/owasp/webgoat/lessons/sqlinjection/mitigation/SqlOnlyInputValidationTest.java:18-28 submits the exact no-space SQL-injection payload and asserts lesson completion plus disclosure of a stored password; src/it/java/org/owasp/webgoat/integration/SqlInjectionMitigationIntegrationTest.java:46-49 exercises the same payload end to end and asserts that the assignment succeeds; src/main/resources/lessons/sqlinjection/i18n/WebGoatLabels.properties:108-110 explicitly instructs learners to bypass the space restriction using a comment."
  - consequence: "An authenticated learner can guess Tom's favorite color from a small fixed answer set, satisfy Tom's password-recovery security question, and complete the password-reset lesson's recovery gate."
    evidence: "src/main/resources/lessons/passwordreset/documentation/PasswordReset_known_questions.adoc:16-20 explicitly sets the goal of retrieving another user's password by trying Tom, admin, or Larry against a recovery page with no lockout; src/main/java/org/owasp/webgoat/lessons/passwordreset/QuestionsAssignment.java:23-52 deliberately maps Tom to purple and returns assignment success for that answer; src/it/java/org/owasp/webgoat/integration/PasswordResetLessonIntegrationTest.java:53-57 submits tom/purple and asserts that the assignment succeeds."
  - consequence: "An authenticated learner can distinguish unknown usernames, the signed-in `webgoat` username, and recognized password-recovery usernames from the endpoint's different feedback messages, yielding a reliable list of recovery targets."
    evidence: "src/main/resources/lessons/passwordreset/documentation/PasswordReset_known_questions.adoc:16-20 explicitly tells learners to retrieve another user's password and supplies Tom, admin, and Larry as usernames to try; src/main/java/org/owasp/webgoat/lessons/passwordreset/QuestionsAssignment.java:41-54 deliberately returns separate feedback for `webgoat`, unknown usernames, and recognized usernames with a wrong answer; src/main/resources/lessons/passwordreset/i18n/WebGoatLabels.properties:8-9 defines the distinct client-visible messages."
  - consequence: "An authenticated learner can inject a second SQL statement into the advanced last-name lookup and retrieve usernames and stored passwords from the learner's `user_system_data` lesson table."
    evidence: "src/main/resources/lessons/sqlinjection/documentation/SqlInjection_content6a.adoc:16-31 explicitly identifies the field as SQL-injectable, asks learners to retrieve every row from `user_system_data`, and names appending a SQL statement as a supported solution; src/test/java/org/owasp/webgoat/lessons/sqlinjection/introduction/SqlInjectionLesson6aTest.java:60-68 submits the exact stacked-statement password-dump payload and asserts lesson completion plus disclosure of `passW0rD`; src/it/java/org/owasp/webgoat/integration/SqlInjectionAdvancedIntegrationTest.java:29-38 exercises stacked-query and UNION solutions end to end and asserts both succeed."
  - consequence: "An authenticated learner can use the advanced registration form as a boolean oracle to infer Tom's stored password one character at a time."
    evidence: "src/main/resources/lessons/sqlinjection/i18n/WebGoatLabels.properties:99-105 explicitly instructs learners to guess Tom's password one character at a time using the registration response and the same substring payload; src/it/java/org/owasp/webgoat/playwright/webgoat/lessons/SqlInjectionAdvancedUITest.java:88-109 asserts the distinct already-exists and created responses for true and false character guesses; src/it/java/org/owasp/webgoat/integration/SqlInjectionAdvancedIntegrationTest.java:13-27 exercises the true-predicate registration payload and then logs in with Tom's recovered password."
  - consequence: "An authenticated learner can inject a second SQL statement into the access-log search and drop that learner's `access_log` lesson table, making its data unavailable until the lesson schema is reset."
