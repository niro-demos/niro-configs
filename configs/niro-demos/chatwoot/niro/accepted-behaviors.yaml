# accepted-behaviors.yaml — a risk-acceptance register.
#
# Every entry is a behavior treated as ACCEPTED: as long as an entry exists, the
# tool considers that behavior intended and does not re-report it. To stop
# accepting one, delete it — the finding comes back. Version control records who
# changed what, and when.
#
#   consequence:  [tool] the precise risk, in plain terms a non-expert can
#                 evaluate — what could actually happen. (max 1000 runes)
#   evidence:     [tool] proof it looks intentional — comment / test / flag /
#                 code, by file:line.
#   reason:       [human] your team's rationale for accepting this — your own
#                 documentation. The tool never writes it, and an entry is
#                 accepted by being here, not by this field. But fill it in: an
#                 undocumented acceptance no one can explain later is how real
#                 risk quietly gets forgotten.
#
# Be specific enough to adjudicate in seconds. Vague entries hide real bugs.
#
# This file accumulates across runs and is APPEND-ONLY. Anyone updating it — tool
# or human — must read it first, keep every existing entry (especially the human
# `reason`), and only append; never rewrite, reorder, or drop entries. Presence
# is the suppression signal, so a clobbered entry silently un-accepts a finding.
# COMMIT it to git — that is your history, your review trail, and your undo.

accepted_behaviors:
  - consequence: "A public help-center visitor can retrieve the full body of an unpublished article when its URL is known."
    evidence: "spec/controllers/public/api/v1/portals/articles_controller_spec.rb:131 asserts the public HTML article route succeeds for a draft article."
  - consequence: "A standard account agent can connect a WhatsApp business channel to the account through embedded signup."
    evidence: "spec/controllers/api/v1/accounts/whatsapp/authorizations_controller_spec.rb:59 asserts an agent can create a WhatsApp channel successfully."
  - consequence: "TC-E4CDC156: A platform API client can attach itself to an existing user by submitting that user's email, then access platform-only user actions such as login URL generation for that user."
    evidence: "spec/controllers/platform/api/v1/users_controller_spec.rb:183 asserts POST /platform/api/v1/users fetches an existing user and creates a platform_app_permissible for that user."
  - consequence: "A public inbox visitor who knows an API inbox identifier, contact source ID, and conversation ID can read that contact's conversations and messages and update conversation read-state without sending credentials or a fresh identity hash."
    evidence: "spec/controllers/public/api/v1/inbox/conversations_controller_spec.rb:19 asserts a request without credentials returns conversations when hmac_verified is true; spec/controllers/public/api/v1/inbox/messages_controller_spec.rb:10 and spec/controllers/public/api/v1/inbox/conversations_controller_spec.rb:132 assert public message reads and last-seen updates succeed."
  - consequence: "A standard account agent can generate a Shopify store-linking OAuth URL for the account."
    evidence: "spec/controllers/api/v1/accounts/integrations/shopify_controller_spec.rb:21 asserts an authenticated agent receives a Shopify OAuth redirect URL."
