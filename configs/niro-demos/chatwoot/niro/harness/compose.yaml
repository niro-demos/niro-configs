services:
  base:
    build:
      context: ${PROJECT_ROOT}
      dockerfile: docker/Dockerfile
      args:
        BUNDLE_WITHOUT: ''
        EXECJS_RUNTIME: Node
        RAILS_ENV: development
        RAILS_SERVE_STATIC_FILES: 'false'
    image: chatwoot:development
    env_file: ${HARNESS_DIR}/run/app.env
    command: ["true"]

  rails:
    build:
      context: ${PROJECT_ROOT}
      dockerfile: docker/dockerfiles/rails.Dockerfile
    image: chatwoot-niro-rails:development
    env_file: ${HARNESS_DIR}/run/app.env
    environment:
      VITE_DEV_SERVER_HOST: vite
      NODE_ENV: development
      RAILS_ENV: development
    volumes:
      - ${PROJECT_ROOT}:/app:delegated
      - node_modules:/app/node_modules
      - packs:/app/public/packs
      - cache:/app/tmp/cache
      - bundle:/usr/local/bundle
    depends_on:
      - postgres
      - redis
      - mailhog
    ports:
      - "${CHATWOOT_RAILS_PORT:-3300}:3000"
    entrypoint: docker/entrypoints/rails.sh
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]

  sidekiq:
    build:
      context: ${PROJECT_ROOT}
      dockerfile: docker/dockerfiles/rails.Dockerfile
    image: chatwoot-niro-rails:development
    env_file: ${HARNESS_DIR}/run/app.env
    environment:
      NODE_ENV: development
      RAILS_ENV: development
    volumes:
      - ${PROJECT_ROOT}:/app:delegated
      - node_modules:/app/node_modules
      - packs:/app/public/packs
      - cache:/app/tmp/cache
      - bundle:/usr/local/bundle
    depends_on:
      - postgres
      - redis
      - mailhog
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]

  vite:
    build:
      context: ${PROJECT_ROOT}
      dockerfile: docker/dockerfiles/vite.Dockerfile
    image: chatwoot-niro-vite:development
    env_file: ${HARNESS_DIR}/run/app.env
    environment:
      VITE_DEV_SERVER_HOST: 0.0.0.0
      NODE_ENV: development
      RAILS_ENV: development
    volumes:
      - ${PROJECT_ROOT}:/app:delegated
      - node_modules:/app/node_modules
      - packs:/app/public/packs
      - cache:/app/tmp/cache
      - bundle:/usr/local/bundle
    ports:
      - "${CHATWOOT_VITE_PORT:-3336}:3036"
    entrypoint: docker/entrypoints/vite.sh
    command: ["bin/vite", "dev"]

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: chatwoot_niro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: chatwoot_niro
      PGDATA: /data/postgres
    volumes:
      - postgres:/data/postgres
    ports:
      - "${CHATWOOT_POSTGRES_PORT:-6432}:5432"

  redis:
    image: redis:alpine
    command: ["sh", "-c", "redis-server --requirepass \"$REDIS_PASSWORD\""]
    env_file: ${HARNESS_DIR}/run/app.env
    volumes:
      - redis:/data/redis
    ports:
      - "${CHATWOOT_REDIS_PORT:-66379}:6379"

  mailhog:
    image: mailhog/mailhog
    ports:
      - "${CHATWOOT_SMTP_PORT:-11025}:1025"
      - "${CHATWOOT_MAILHOG_PORT:-18025}:8025"

volumes:
  postgres:
  redis:
  packs:
  node_modules:
  cache:
  bundle:
