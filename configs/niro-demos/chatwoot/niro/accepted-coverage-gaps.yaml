# accepted-coverage-gaps.yaml — what cannot be tested in this setup, and why.
#
# Every entry is a coverage gap treated as ACCEPTED: as long as an entry exists,
# the tool will not re-report that gap on every run. To stop accepting one (it
# became testable — you added the credential, enabled the flag, wired the
# service), delete it. Version control records who changed what, and when.
#
#   gap:     what cannot be exercised here — the specific surface or capability
#            left untested. (max 1000 runes)
#   reason:  why it is structurally untestable in THIS setup — prod-only behavior,
#            external infra/secrets you don't have, a licensed build you can't
#            produce. Be specific enough that a reviewer can challenge it.
#
# Only genuinely unfixable gaps belong here. A gap you could close by adding a
# fixture, credential, or flag is work to do — not a gap to accept. Broad entries
# hide real blind spots.
#
# This file accumulates across runs and is APPEND-ONLY. Anyone updating it — tool
# or human — must read it first, keep every existing entry, and only append;
# never rewrite, reorder, or drop entries. There is no generator for it (it is
# authored judgment, not derived data), so a clobbered entry is gone for good.
# COMMIT it to git — that is your history, your review trail, and your undo.

accepted_coverage_gaps:
  - gap: "Live rate-limiting and brute-force resistance enforced by Rack::Attack"
    reason: "The checkout-local harness runs Rails in development, where config/initializers/rack_attack.rb disables Rack::Attack, and also sets ENABLE_RACK_ATTACK_WIDGET_API=false so shared localhost buckets do not create false negatives during the sweep. Rate-limiting and brute-force resistance must be confirmed by static review or a dedicated production-like profile."
  - gap: "Third-party OAuth, SSO, and SAML identity-provider flows"
    reason: "The local destructive runtime uses seeded password users only and has no Google OAuth, SAML IdP, or external SSO credentials. Password login is testable; external identity-provider enforcement is not."
  - gap: "Real social, messaging, commerce, and integration provider callbacks"
    reason: "The seeded baseline creates local web-widget inboxes but does not have authorized Facebook, Instagram, WhatsApp, Twitter/X, TikTok, Slack, Shopify, Linear, Notion, or similar external provider credentials or webhook origins."
  - gap: "Final inbound and outbound email delivery"
    reason: "The harness routes SMTP to local Mailhog for safe capture. It can exercise application email generation and local SMTP handoff, but not real mailbox delivery, provider webhooks, spam filtering, or inbox receipt."
  - gap: "Mobile push notification delivery"
    reason: "The local runtime disables the push relay and has no APNS/FCM/VAPID credentials or enrolled mobile devices, so notification generation can be inspected but end-device delivery cannot be exercised."
