# Niro project configuration. Uncomment any field to override its default.

# Schema version for Niro's initial public configuration contract. Niro refuses
# versions it does not understand with a clear upgrade message.
version: 1

# container:
#   runtime: auto                # default; one of: auto, docker, podman.
#                                # auto detects in order: docker, podman.
#   max_memory: 512m             # string (e.g. 512m, 2g) — container memory cap.
#   max_cpu: 2                   # number (0.1–32) — container vCPU cap.
#   idle_timeout_minutes: 240    # default (4h); integer > 0. How long
#                                # niro-agent (the process inside the
#                                # container) waits with zero active MCP
#                                # requests before self-exiting. Sized to
#                                # absorb a dev's lunch + meetings without
#                                # losing pentest state — niro-agent holds
#                                # test cases / creds in
#                                # process memory; an exit drops them and
#                                # append/verify/dispute would spin a
#                                # fresh, empty container. close_pentest
#                                # is the explicit shutdown (immediate,
#                                # host-side docker stop); this knob only
#                                # governs the never-coming-back case.

limits:
  max_budget_usd: 100           # default; floor 10; no ceiling. Caps LLM
#                                # spend per run. Below 10, runs reliably abort
#                                # before producing useful findings — so the
#                                # floor equals the default. Crank up freely
#                                # for staging-wide assessments.
  max_duration_minutes: 120     # default; floor 15; no ceiling. Wall-clock
#                                # cap from run start. Same floor=default
#                                # principle as max_budget_usd.
#   max_concurrency: 6           # default; range 1..16. How many test cases
#                                # run in parallel. Your LLM provider's rate
#                                # limits bind first — drop this to 1 for
#                                # tight budgets or to work around throttling.
  max_test_case_duration_minutes: 15  # default; floor 1; must be <=
#                                # max_duration_minutes. Per-test-case time
#                                # budget. When a single test case exceeds
#                                # this, Niro auto-marks it BLOCKED with an
#                                # actionable reason and lets siblings keep
#                                # running. Raise it for projects where
#                                # individual cases legitimately take
#                                # longer (deep enumeration, hard targets).

# models:
#   high:    <model-name>        # most capable model. Used when Niro needs
#                                # strong reasoning (novel test cases, hard
#                                # exploits). Costs more per call.
#   medium:  <model-name>        # balanced default for most work.
#   low:     <model-name>        # cheapest model. Used for routine checks
#                                # where speed and cost matter more than depth.
#
# All three slots optional and independent — pin only what you care about. Omit
# a slot to keep Niro's built-in default for the selected agent CLI; this is the
# recommended path — Niro auto-selects both the model and the correct identifier
# form for your agent CLI and auth setup.
#
# If you DO pin a name, it is used verbatim — Niro does not rewrite an explicit
# override — so it must be the exact identifier your active agent CLI accepts (the
# same name you'd pass to its own --model flag). For GitHub Copilot this depends
# on your auth path: native Copilot OAuth needs dot-form (e.g. claude-opus-4.7),
# while BYOK Anthropic needs hyphen-form (e.g. claude-opus-4-7). When unsure,
# omit the override and let Niro pick the correct form automatically.
#
# GitHub Copilot BYOK is all-or-nothing: it activates only when ALL THREE of
# COPILOT_PROVIDER_TYPE, COPILOT_PROVIDER_BASE_URL and COPILOT_PROVIDER_API_KEY
# are set. A partially-set env is treated as native OAuth (not BYOK), so a
# half-configured setup silently expects dot-form — set all three, or none.
#
# Migration (Copilot, dot/hyphen): older Niro silently rewrote a hyphen-form
# override to dot-form. That rewrite was removed — an override is now used
# exactly as written. If you pinned a hyphen-form model for native Copilot OAuth,
# switch it to dot-form (or drop the override) to avoid an HTTP 404.
#
# Niro only validates that pinned names are non-empty when present. It does not
# probe the active agent CLI's model catalog before a run; an unsupported name
# will fail later when that attacker agent session is created.

# Git provider settings.
# git_provider:
#   kind: auto                   # default; one of: auto, github, gitlab,
#                                # azure-devops. "auto" detects
#                                # from the repo's origin URL via hostname
#                                # match (github.com, gitlab.com, etc.)
#                                # falling back to an API probe for self-
#                                # hosted instances. Override only when
#                                # running a self-hosted Git provider on a custom
#                                # domain auto-detect can't reach (rare,
#                                # e.g. airgapped GitLab Enterprise).
#   publish: true                # default. Controls all Git provider
#                                # publishing: the canonical PR comment, the
#                                # "pending" commit status at kickoff, and the
#                                # final pass/fail merge-gate status.
#                                # false = read the PR/diff and pentest
#                                # normally, but write NOTHING back to the
#                                # Git provider — no comment or statuses.
#                                # Reads are unaffected (full rate limits,
#                                # private repos);
#                                # this is the supported "run silent" knob.
#                                # Dropping the token is not — it breaks the
#                                # read too.
#                                # NOTE: if "Security / Niro" is a required
#                                # status check in branch protection,
#                                # publish: false leaves it perpetually
#                                # pending — drop the requirement too, or PRs
#                                # cannot merge.

# min_severity: medium           # default; one of: critical, high, medium, low.
#                                # findings below this floor are not reported and
#                                # not tested (saves cost — fewer test cases run).

# log_level: info                # default; one of: debug, info, warn, error.

# telemetry: true                 # default. Anonymous usage telemetry (counts,
#                                # durations, cost — no URLs, targets, or code).
#                                # Set false to disable for this project. See
#                                # the Telemetry section of the README.

# headless: false                # default. When true, block-tier reflection
#                                # concerns demote to advisory, the run proceeds,
#                                # and concerns
#                                # surface for audit instead of halting for
#                                # an interactive reflection token. CI /
#                                # automation workflows set this to true.

# security:
#   env:
#     # ADDITIONAL host environment variables Niro should read, beyond the
#     # ones it already reads for your agent CLI. Niro automatically reads
#     # the standard credentials and settings your agent CLI uses (API
#     # keys, tokens, proxy, region, model) — you do NOT need to list those.
#     #
#     # Use this only for a variable Niro doesn't already know by name, such
#     # as a key for a self-hosted model gateway or a custom provider. Omit
#     # the section entirely if you don't have one.
#     #
#     # Exact POSIX names ([A-Z_][A-Z0-9_]*); no globs or prefixes. Each name
#     # Niro reads is recorded in niro-security.jsonl (env_authorized).
#     access:
#       - MY_GATEWAY_API_KEY             # key for a self-hosted model gateway
#       - MY_PROVIDER_TOKEN              # a custom provider credential
