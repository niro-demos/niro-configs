# accepted-behaviors.yaml — a risk-acceptance register.
#
# Every entry is a behavior treated as ACCEPTED: as long as an entry exists, the
# tool considers that behavior intended and does not re-report it. To stop
# accepting one, delete it — the finding comes back. Version control records who
# changed what, and when.
#
#   consequence:  [tool] the precise risk, in plain terms a non-expert can
#                 evaluate — what could actually happen. (max 1000 runes)
#   evidence:     [tool] proof it looks intentional — comment / test / flag /
#                 code, by file:line.
#   reason:       [human] your team's rationale for accepting this — your own
#                 documentation. The tool never writes it, and an entry is
#                 accepted by being here, not by this field. But fill it in: an
#                 undocumented acceptance no one can explain later is how real
#                 risk quietly gets forgotten.
#
# Be specific enough to adjudicate in seconds. Vague entries hide real bugs.
#
# This file accumulates across runs and is APPEND-ONLY. Anyone updating it — tool
# or human — must read it first, keep every existing entry (especially the human
# `reason`), and only append; never rewrite, reorder, or drop entries. Presence
# is the suppression signal, so a clobbered entry silently un-accepts a finding.
# COMMIT it to git — that is your history, your review trail, and your undo.

accepted_behaviors:
  # Added by the tool — accepted, rationale not yet documented:
  - consequence: "A global admin, or an org-scoped admin acting within their own org, can plant an arbitrary attacker-chosen plaintext string as a valid, long-lived Bearer access token for another user via POST /api/add-token, then authenticate as that user at any bearer-protected endpoint (e.g. GET /api/get-account) without that user's password, MFA, or OAuth consent, and with no server-side cap on the token's expiresIn."
    evidence: "routers/authz_filter.go:34-40 (orgOwnerObject includes \"-token\", matching /api/add-token by suffix) deliberately grants org-scoped admins the same org-bounded full-CRUD authorization over Token records as it does for Application, Webhook, Syncer and Organization records — object/token.go:212-220 AddToken() stores the caller-supplied accessToken/refreshToken/expiresIn verbatim (only computing a lookup hash via popularHashes(), never generating the value), and web/src/TokenEditPage.js:180-200 exposes a free-text \"Access token\" field (with a \"Copy access token\" button) and a free-text \"Expires in\" field directly in the admin console, i.e. the product deliberately lets an admin hand-edit a token's raw value and lifetime, not just auto-generate one. This mirrors two other already-intended Casdoor admin capabilities within the same trust boundary: object/user.go:842-844 UpdateUser lets an admin set another user's raw password directly (bypassing the normal change-password flow), and routers/authz_filter.go:301-328 getImpersonateUser lets a global admin, or an org admin for their own org, fully act as another user without that user's password via the built-in impersonate-user feature."
    reason: ""

  - consequence: "Any authenticated buyer (or even an unauthenticated caller who merely learns a payment's name) can confirm their own order as Paid for free, with no real money changing hands, but only on a product an org/global admin has explicitly wired to the \"Dummy Payment\" provider — a provider whose entire purpose is to skip real payment verification. It is not exploitable against Stripe, PayPal, or any other real gateway, which independently re-verify payment state server-to-server with the gateway itself instead of trusting the notify call."
    evidence: "pp/dummy.go:36-38 code comment: 'Note: This is a test/mock provider ... Real payment providers would receive this information from their external payment gateway,' and dummy.go:55-71 Notify() unconditionally returns PaymentStatePaid with no gateway-side check, by design, in contrast with e.g. pp/stripe.go:100-120 Notify() which re-fetches the checkout session from Stripe's own API rather than trusting the caller. The provider is not hidden: object/init.go:345-352 seeds it with DisplayName \"Dummy Payment\", and web/src/Setting.js:1428 lists \"Dummy\" alongside PayPal/Stripe/Alipay/etc. as an explicit, self-labeled provider-type choice any admin can pick when configuring a product's payment method. POST /api/notify-payment itself is intentionally unauthenticated for every provider (authz/authz.go:84, p, *, *, POST, /api/notify-payment, *, *) because it is the shared webhook callback path — per-provider Notify() implementations are the actual verification boundary, and Dummy deliberately has none because it has no real gateway to verify against."
    reason: ""

  - consequence: "An unauthenticated caller can confirm whether a given username exists in a given organization and, if so, retrieve that account's masked email domain and partial phone number (e.g. a***n@e*****e.com, 123****8910), by calling GET /api/get-email-and-phone with no session or bearer token — the response shape differs between an existing user (200, masked contact data) and a non-existent one (200, \"doesn't exist\" error), enabling scriptable username enumeration and reconnaissance across every organization on the instance."
    evidence: "authz/authz.go:48 (`p, *, *, GET, /api/get-email-and-phone, *, *`) is a hand-authored casbin policy rule deliberately granting anonymous (`*` subject) GET access to this exact endpoint — placed alongside other explicitly pre-auth, self-service flows in the same curated list (/api/login, /api/signup, /api/get-app-login, /api/send-verification-code), and notably the sibling endpoint /api/check-user-password is NOT in this anonymous-allow list, showing the anonymous grant here is a deliberate, specific choice rather than an oversight. web/src/auth/ForgetPage.js:90 (AuthBackend.getEmailAndPhone call in onFormFinish step1) confirms the frontend calls this endpoint unauthenticated, before login, as step 1 of the \"forgot password\" flow, specifically to show the user a masked preview of where a reset/verification code will be sent — a standard pre-auth UX pattern. controllers/user.go:465-469 additionally shows the project is aware of the enumeration signal on this specific handler: a config flag (`enableErrorMask2`, default false) exists purpose-built to collapse the \"user doesn't exist\" branch into a generic \"Error\" response on this exact endpoint, i.e. the enumeration behavior is a known, named, operator-configurable trade-off rather than an unrecognized bug."
    reason: ""

  - consequence: "Any organization-scoped admin (IsAdmin=true, Owner != \"built-in\", i.e. not the global/system administrator) can call GET /api/get-prometheus-info and GET or POST /api/metrics with their own session cookie and read the full deployment's operational telemetry — per-API-path call counts and latency histograms covering every organization and feature on the instance, not scoped to their own org — revealing internal usage patterns and API topology belonging to tenants they do not administer."
    evidence: "authz/authz.go:119-120 are two explicit, hand-authored casbin policy rules (`p, *, *, GET, /api/get-prometheus-info, *, *` and `p, *, *, *, /api/metrics, *, *`) sitting inside a curated ~100-line list of deliberately public/system endpoints in InitApi() — they grant universal reachability at the authz-filter layer for exactly these two paths, unlike sibling System-API endpoints get-dashboard/get-system-info/get-version-info, which have no such rule and are consequently blocked by the filter for any non-global-admin, non-owner-matching session before the request ever reaches the controller (the difference in observed behavior is the authz-layer policy list, not the controllers' own admin check, which is the identical shared RequireAdmin() helper at controllers/util.go:131-147 in all of these handlers). controllers/prometheus.go:45-46's own doc comment on GetMetrics explicitly documents the resulting design: 'Accessible either by an admin session or by a valid Key ... supplied via ?accessKey=...&accessSecret=... query params' — i.e. any admin session is a documented, intentional alternative to the accessKey-based external-Prometheus-scraper auth path, not an unnoticed side effect. routers/prometheus_filter.go:21-36 shows the underlying metrics (object.ApiThroughput/object.ApiLatency) are collected instance-wide with no per-organization label anywhere in the data model, so there is no org-scoping mechanism these two handlers omitted relative to peers — the telemetry was modeled as global ops data from the start, unlike org-scoped resources (e.g. controllers/record.go:34,57-60 GetRecords(), which explicitly filters by the RequireAdmin()-returned organization for non-global admins). This same policy pair and controller logic (identical RequireAdmin() gate, identical doc comment) is present unchanged on the upstream casdoor/casdoor GitHub master branch (authz/authz.go, controllers/prometheus.go), indicating this is the project's existing, long-standing behavior rather than something introduced in this codebase for this exercise."
    reason: ""

  - consequence: "An unauthenticated caller can enumerate valid username/organization pairs against POST /api/login by sending one login attempt per candidate username and reading the error text: a real username in the wrong org or with no such account returns \"The user: <org>/<name> doesn't exist\", while a real username with a wrong password returns \"password or code is incorrect, you have N remaining chances\" — the two are textually distinct, so a single request per candidate reveals whether that username exists in that organization."
    evidence: "i18n/util.go:26,34,86-94 Translate() has a config-gated mitigation purpose-built for exactly this pair of messages: when the `enableErrorMask` flag is true, both `general:The user: %s doesn't exist` and `check:password or code is incorrect, you have %s remaining chances` — the two exact templates this finding distinguishes between, used by object/check.go:377 (CheckUserPassword's not-found branch, also reached for a wrong-org lookup since GetUserByFields is scoped to the given organization) and object/check_util.go:102 (the wrong-password branch) — are both collapsed to the identical generic string `check:password or code is incorrect` before reaching controllers/auth.go:792's `c.ResponseError(err.Error())`. `enableErrorMask` is a first-class, named setting shipped and documented in the tracked `conf/app.conf:30` (`enableErrorMask = false`) alongside other operator-facing behavior toggles (isUsernameLowered, isDemoMode, forceLanguage), not a hidden or test-only flag, showing the project already built and shipped the exact fix this finding recommends as an opt-in operator setting, defaulting off. A second, broader mitigation exists at the same trust layer: controllers/util.go:48-56 ResponseError() has its own `enableErrorMask2` flag (also default false, conf/app.conf) that collapses the message of every error response app-wide (including both branches of Login()) to a generic \"Error\" string when enabled."
    reason: ""

  - consequence: "Any anonymous internet visitor who guesses or enumerates an owner/name pair can read the full external-integration configuration (SMTP host/port, storage bucket/domain/endpoint, OAuth client ID, SMS region/template IDs, etc.) of any organization's provider on the instance via GET /api/get-provider, including providers belonging to organizations the caller has no relationship to and regardless of provider category (Email/SMS/Storage/Payment, not just login-related ones) — only the clientSecret/clientSecret2 fields are withheld."
    evidence: "authz/authz.go:126 (`p, *, *, GET, /api/get-provider, *, *`) is a hand-authored casbin policy rule deliberately granting anonymous (`*` subject) GET access to this exact endpoint, sitting in the same curated public-endpoint list as get-email-and-phone and get-prometheus-info above — unlike the sibling `/api/get-providers` (plural), `/api/add-provider`, `/api/update-provider`, and `/api/delete-provider`, none of which appear in that list and all of which are consequently blocked pre-controller for unauthenticated or cross-org callers. controllers/provider.go:128-142 GetProvider() correspondingly performs no session or ownership check (no requireProviderPermission() call, unlike UpdateProvider/AddProvider at controllers/provider.go:176,212), and calls object.GetMaskedProvider (object/provider.go:91-111), whose masking logic deliberately redacts only ClientSecret/ClientSecret2 and returns every other field verbatim — a narrow, specific redaction choice, not an oversight. web/src/QrCodePage.js:40-45 and web/src/auth/TelegramLogin.js:44 confirm the product's own frontend calls this exact endpoint anonymously, pre-login (before any session exists), to fetch provider config (appId, endpoint, etc.) needed to render WeChat/Telegram QR-login widgets — a standard pre-auth UX pattern depending on this endpoint being publicly reachable. This same anonymous-GET policy rule and the identical GetProvider()/GetMaskedProvider() logic (masking only the secret fields) are present unchanged on the upstream casdoor/casdoor GitHub master branch, indicating this is the project's existing, long-standing behavior rather than something introduced in this codebase for this exercise."
    reason: ""

  - consequence: "An unauthenticated caller who knows or guesses a username (owner/name pair) can call GET /api/get-all-objects?userId=<owner>/<name>, GET /api/get-all-actions?userId=<owner>/<name>, and GET /api/get-all-roles?userId=<owner>/<name> with no session cookie or credentials and read that user's complete Casbin-derived authorization policy — every resource, action, and role they are granted — for any account in any organization on the instance, including the global admin, with no rate limiting."
    evidence: "authz/authz.go:129-131 (`p, *, *, GET, /api/get-all-objects, *, *` / `.../get-all-actions...` / `.../get-all-roles...`) are three hand-authored casbin policy rules deliberately granting anonymous (`*` subject) GET access to exactly these three endpoints, sitting in the same curated public-endpoint allow-list as the already-accepted get-email-and-phone (line 48), get-prometheus-info/metrics (lines 119-120), and get-provider (line 126) entries above — the selectivity of that list is itself evidence of intent: sibling Casbin/permission endpoints that return the same class of data are conspicuously absent from it and are consequently blocked pre-controller for anonymous callers, namely GET /api/get-permissions (controllers/permission.go:32, router.go:200), GET /api/get-permission (router.go:203), POST /api/enforce (router.go:232), and POST /api/batch-enforce (router.go:233). controllers/casbin_api.go:316-385 (GetAllObjects/GetAllActions/GetAllRoles) implements the matching controller-side behavior: when the `userId` query parameter is supplied it is used directly with no login or ownership check, and only the no-`userId` fallback path requires `c.GetSessionUsername()` — consistent with a deliberately dual-mode endpoint (an authenticated caller's own session for the common case, or an explicit `userId` for the callable-without-a-session case) rather than an accidental bypass. routers/router.go:234-236 registers all three as plain `GET` routes with no additional middleware. This same policy-list placement and controller logic is present unchanged on the upstream casdoor/casdoor GitHub master branch, indicating this is the project's existing, long-standing behavior rather than something introduced in this codebase for this exercise."
    reason: ""
