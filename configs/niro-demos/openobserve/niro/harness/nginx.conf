daemon off;
pid /home/runner/work/openobserve/openobserve/niro/harness/run/nginx.pid;
error_log /home/runner/work/openobserve/openobserve/niro/harness/run/nginx-error.log;

events {}

http {
  access_log /home/runner/work/openobserve/openobserve/niro/harness/run/nginx-access.log;

  server {
    listen 127.0.0.1:5080;
    listen 172.17.0.1:5080;
    server_name 127.0.0.1 localhost;

    location /web/ {
      alias /home/runner/work/openobserve/openobserve/web/dist/;
      try_files $uri $uri/ /web/index.html;
      sub_filter_once on;
      sub_filter '<base href="/" />' '<base href="/web/" />';
    }

    location / {
      proxy_pass http://127.0.0.1:5082;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }
}
