# accepted-behaviors.yaml — a risk-acceptance register.
#
# Every entry is a behavior treated as ACCEPTED: as long as an entry exists, the
# tool considers that behavior intended and does not re-report it. To stop
# accepting one, delete it — the finding comes back. Version control records who
# changed what, and when.
#
#   consequence:  [tool] the precise risk, in plain terms a non-expert can
#                 evaluate — what could actually happen. (max 1000 runes)
#   evidence:     [tool] proof it looks intentional — comment / test / flag /
#                 code, by file:line.
#   reason:       [human] your team's rationale for accepting this — your own
#                 documentation. The tool never writes it, and an entry is
#                 accepted by being here, not by this field. But fill it in: an
#                 undocumented acceptance no one can explain later is how real
#                 risk quietly gets forgotten.
#
# Be specific enough to adjudicate in seconds. Vague entries hide real bugs.
#
# This file accumulates across runs and is APPEND-ONLY. Anyone updating it — tool
# or human — must read it first, keep every existing entry (especially the human
# `reason`), and only append; never rewrite, reorder, or drop entries. Presence
# is the suppression signal, so a clobbered entry silently un-accepts a finding.
# COMMIT it to git — that is your history, your review trail, and your undo.

accepted_behaviors:
  - consequence: "Anyone who obtains a user's login cookie can recover the user's reusable password and continue authenticating until that password is changed."
    evidence: "src/api/src/handler/http/request/users/mod.rs:903 explicitly constructs the auth_tokens access token as Basic base64(name:password); tests/api-testing/helpers/workflow/pages/enrichment_page.py:74 constructs and uses the same cookie format."
  - consequence: "Any authenticated service account in an organization can read and overwrite that organization's shared key-value configuration and application state."
    evidence: "src/api/src/handler/http/request/kv/mod.rs:34-42 and 79-87 document authenticated organization KV reads and writes for configuration/application state; handlers at lines 54 and 100 intentionally accept no caller identity or role/grant input."
  - consequence: "An organization administrator can trigger an immediate instance-wide refresh of built-in model-pricing metadata inherited by every organization."
    evidence: "web/src/components/settings/ModelPricingList.vue:48 exposes Refresh as a normal Model Pricing action and :862 calls the organization-scoped refresh endpoint; web/src/components/settings/ModelPricingList.spec.ts:1006 tests that this action succeeds and refetches models."
  - consequence: "In the community build, any service account belonging to an organization can create organization-wide transformation functions, saved searches, and dashboard folders without a separate content-management grant."
    evidence: "src/api/src/handler/http/request/functions/mod.rs:63, src/api/src/handler/http/request/search/saved_view.rs:186, and src/api/src/handler/http/request/folders.rs:64 intentionally accept no caller identity or grant context; the folder API at src/api/src/handler/http/request/folders.rs:41 describes access permissions as conditional on using RBAC, which is an enterprise capability."
  - consequence: "Anyone who can reach the public HTTP listener can read Prometheus telemetry containing organization identifiers and tenant activity, request status, and latency labels."
    evidence: "src/api/src/handler/http/router/mod.rs:466-470 deliberately registers /metrics in basic_routes without authentication middleware, and the handler at lines 395-397 exposes gathered metrics when the prometheus_enabled capability flag is set."
