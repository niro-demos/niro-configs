name: Install approved Niro configuration
description: Copy a reviewed repository-specific Niro config into the workspace

inputs:
  destination:
    description: Workspace-relative destination
    required: false
    default: niro

runs:
  using: composite
  steps:
    - name: Install configuration
      shell: bash
      env:
        NIRO_CONFIG_DESTINATION: ${{ inputs.destination }}
      run: "$GITHUB_ACTION_PATH/install.sh"
