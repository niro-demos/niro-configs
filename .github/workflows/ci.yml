name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run tests
        run: python3 -m unittest discover -s tests -v
      - name: Check shell syntax
        run: bash -n .github/actions/install/install.sh scripts/prep-niro-demos-forks.sh
      - name: Validate catalog
        run: python3 scripts/catalog.py validate
